<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#f2f2f7; --card:#fff; --border:#e5e5ea; --label:#8e8e93; --text:#1c1c1e; --r:12px; --rs:8px; }
html,body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); max-width:390px; margin:0 auto; display:flex; flex-direction:column; height:100dvh; }

.header { padding:52px 20px 12px; flex-shrink:0; }
.date-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:2px; }
.date-main { font-size:22px; font-weight:600; letter-spacing:-.3px; }
.date-main span { font-weight:300; color:var(--label); }
.divider { height:1px; background:var(--border); margin:0 20px; flex-shrink:0; }

.content { flex:1; overflow-y:auto; padding:14px 20px 0; display:flex; flex-direction:column; gap:14px; }
.section-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:8px; }

.brief-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.brief-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); }
.brief-item:last-child { border-bottom:none; }
.brief-item svg { width:16px; height:16px; stroke:var(--text); fill:none; stroke-width:1.6; flex-shrink:0; }
.brief-title { flex:1; font-size:14px; font-weight:500; }
.brief-sub { font-size:12px; color:var(--label); }
.play-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; width:100%; cursor:pointer; margin-top:8px; }
.play-btn svg { width:14px; height:14px; fill:white; }

.projects-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.project-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
.project-item:last-child { border-bottom:none; }
.project-item svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; flex-shrink:0; }
.project-name { flex:1; font-size:14px; font-weight:500; }
.project-arrow { font-size:16px; color:var(--label); }
.new-project { display:flex; align-items:center; padding:10px 14px; gap:10px; cursor:pointer; border-top:1px solid var(--border); }
.new-project svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; }
.new-project span { font-size:14px; color:var(--label); }

.chat-area { display:flex; flex-direction:column; gap:8px; }
.bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; max-width:85%; }
.bubble.user { background:var(--text); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.bubble.assistant { background:var(--card); color:var(--text); align-self:flex-start; border:1px solid var(--border); border-bottom-left-radius:4px; }
.back-btn { font-size:13px; color:var(--label); cursor:pointer; padding:4px 0; margin-bottom:8px; }

/* TRANSCRIPT */
.transcript-box { background:var(--card); border:1px solid var(--border); border-radius:var(--rs); padding:8px 14px; font-size:13px; color:var(--label); font-style:italic; margin:8px 20px; text-align:center; min-height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* HOME CHAT */
.home-chat-wrap { flex:1; overflow-y:auto; padding:0 20px 8px; display:flex; flex-direction:column; gap:8px; }
.home-chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--label); font-size:13px; padding-bottom:20px; }
.home-chat-empty svg { width:32px; height:32px; stroke:var(--border); fill:none; stroke-width:1.5; }

/* CONFIRM CARD */
.confirm-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; margin:0 20px 8px; flex-shrink:0; }
.confirm-card-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:6px; }
.confirm-card-value { font-size:15px; font-weight:500; margin-bottom:12px; word-break:break-all; }
.confirm-card-btns { display:flex; gap:8px; }
.confirm-yes { flex:1; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; }
.confirm-no { flex:1; background:none; color:var(--label); border:1px solid var(--border); border-radius:var(--rs); padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; }
/* Multi-email choice card */
.email-choice-list { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.email-choice-btn { background:var(--bg); border:1px solid var(--border); border-radius:var(--rs); padding:10px 14px; text-align:left; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .15s; }
.email-choice-btn:active { background:var(--border); }
.email-choice-name { font-size:12px; color:var(--label); margin-bottom:2px; }
.email-choice-addr { font-size:14px; font-weight:500; word-break:break-all; }
.email-choice-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px; margin-top:4px; cursor:pointer; }

/* MIC */
.mic-section { display:flex; flex-direction:column; align-items:center; padding:6px 0 8px; flex-shrink:0; }
.mic-status { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:10px; }
.mic-outer { width:76px; height:76px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .25s; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.mic-outer svg { width:30px; height:30px; stroke:var(--text); fill:none; stroke-width:1.5; transition:stroke .25s; }
.mic-outer.idle { animation:idlePulse 3s infinite ease-in-out; }
@keyframes idlePulse { 0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.06)} 50%{box-shadow:0 2px 18px rgba(0,0,0,.13)} }
.mic-outer.listening { background:var(--text); border-color:var(--text); animation:listenPulse 1.2s infinite; }
.mic-outer.listening svg { stroke:#fff; }
@keyframes listenPulse { 0%,100%{box-shadow:0 0 0 10px rgba(28,28,30,.09),0 0 0 20px rgba(28,28,30,.04)} 50%{box-shadow:0 0 0 16px rgba(28,28,30,.06),0 0 0 30px rgba(28,28,30,.02)} }
.mic-outer.thinking svg { stroke:var(--label); }
.mic-outer.speaking { animation:speakPulse .9s infinite ease-in-out; }
@keyframes speakPulse { 0%,100%{box-shadow:0 0 0 6px rgba(28,28,30,.05)} 50%{box-shadow:0 0 0 14px rgba(28,28,30,.03)} }
.mic-hint { font-size:11px; color:var(--label); margin-top:8px; text-align:center; min-height:16px; }

/* BOTTOM NAV */
.bottom-nav { background:rgba(242,242,247,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding:8px 0 24px; flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; cursor:pointer; }
.nav-item svg { width:22px; height:22px; stroke:var(--label); fill:none; stroke-width:1.5; }
.nav-item.active svg { stroke:var(--text); }
.nav-label { font-size:9px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; color:var(--label); }
.nav-item.active .nav-label { color:var(--text); }

/* CALENDAR VIEW */
.cal-day-group { margin-bottom:14px; }
.cal-day-header { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--label); margin-bottom:6px; padding:0 2px; }
.cal-day-header.today { color:var(--text); }
.cal-event { background:var(--card); border-radius:var(--rs); border:1px solid var(--border); padding:11px 14px; margin-bottom:6px; display:flex; gap:12px; align-items:center; cursor:pointer; transition:background .15s; }
.cal-event:active { background:var(--bg); }
.cal-event-time { font-size:12px; font-weight:600; color:var(--label); min-width:40px; text-align:right; line-height:1.3; }
.cal-event-time.allday { font-size:10px; text-transform:uppercase; letter-spacing:.04em; }
.cal-event-dot { width:8px; height:8px; border-radius:50%; background:var(--text); flex-shrink:0; }
.cal-event-dot.today { background:#007aff; }
.cal-event-info { flex:1; min-width:0; }
.cal-event-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-event-duration { font-size:12px; color:var(--label); margin-top:1px; }
.cal-empty { padding:20px 14px; font-size:13px; color:var(--label); text-align:center; }
.cal-add-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; width:100%; cursor:pointer; margin-bottom:14px; }
.cal-add-btn svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; }
.cal-loading { padding:30px; text-align:center; font-size:13px; color:var(--label); }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:390px; }
.modal-title { font-size:17px; font-weight:600; margin-bottom:16px; }
.modal-input { width:100%; border:1px solid var(--border); border-radius:var(--rs); padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:15px; outline:none; background:var(--bg); }
.modal-btn { width:100%; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:13px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; margin-top:12px; cursor:pointer; }
.modal-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:15px; margin-top:8px; cursor:pointer; padding:8px; }
</style>
</head>

<script>
const SUPABASE_URL = 'https://kahpdsismxckxljddxya.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthaHBkc2lzbXhja3hsamRkeHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzE1OTMsImV4cCI6MjA4ODQwNzU5M30.KzFNs2rhbatc4u8Ec1ZcfDVKykZnkLfV2K_cvSakSxc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let activeProject = null;
let conversationHistory = [];
let homeHistory = []; // Conversation history when on home screen

function saveToHistory(role, content) {
  if (activeProject) {
    if (role === 'assistant') conversationHistory.push({ role, content });
  } else {
    homeHistory.push({ role, content });
    if (homeHistory.length > 20) homeHistory = homeHistory.slice(-20);
  }
}
let projects = [];
let isListening = false;
let listenTimeout = null;
let isSpeaking = false;
let driveContext = ''; // File content from Google Drive project folder
let driveFiles = [];   // List of files in current project folder
let isThinking = false;
let recognition = null;
let hasSeeded = false;
let selectedVoice = null;
let calendarConnected = false;

// ── VOICE ──
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  // iOS/Safari: prefer built-in English voices
  const priority = isIOS
    ? ['Daniel', 'Arthur', 'Oliver', 'Karen', 'Samantha', 'Alex']
    : ['Google UK English Male', 'Google US English 1 (Natural)', 'Google UK English Female', 'Daniel', 'Alex', 'Samantha'];
  for (const name of priority) {
    const v = voices.find(v => v.name === name);
    if (v) { selectedVoice = v; console.log('Voice selected:', v.name); return; }
  }
  // Fallback: first English voice
  selectedVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
  console.log('Voice fallback:', selectedVoice?.name);
}
speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 100);
setTimeout(loadVoices, 500);
setTimeout(loadVoices, 1500);

// HTML escape to prevent XSS from calendar/project data
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Central speech queue
let _speakQueue = [];
let _speakBusy = false;
let _stopRequested = false;

function stopSpeaking() {
  _stopRequested = true;
  speechSynthesis.cancel();
  _speakQueue = [];
  _speakBusy = false;
  isSpeaking = false;
  setMicState('idle');
  setMicHint('Tryk for at tale');
}

function _processQueue() {
  if (_stopRequested || _speakBusy || _speakQueue.length === 0) return;
  const { text, onDone } = _speakQueue.shift();
  _speakBusy = true;
  isSpeaking = true;
  setMicState('speaking');

  const safe = text.replace(/ dot /gi, ' DOT ');
  const sentences = safe.match(/[^.!?]+[.!?]*/g) || [safe];
  let idx = 0;

  function next() {
    // Check stop flag before every sentence
    if (_stopRequested) {
      _speakBusy = false;
      return;
    }
    if (idx >= sentences.length) {
      _speakBusy = false;
      isSpeaking = _speakQueue.length > 0;
      if (onDone && !_stopRequested) onDone();
      else if (_speakQueue.length === 0) { setMicState('idle'); setMicHint('Tryk for at tale'); }
      _processQueue();
      return;
    }
    const chunk = sentences[idx].trim().replace(/ DOT /g, ' dot ');
    if (!chunk) { idx++; next(); return; }
    const u = new SpeechSynthesisUtterance(chunk);
    u.voice = selectedVoice || null;
    u.lang = 'en-GB';
    u.rate = isIOS ? 1.0 : 1.1;
    u.pitch = 1.0;
    u.onend = () => { idx++; next(); };
    u.onerror = (e) => {
      // 'interrupted' means we cancelled intentionally — stop completely
      if (e.error === 'interrupted' || e.error === 'canceled') {
        _speakBusy = false;
        isSpeaking = false;
        return;
      }
      console.warn('Speech error:', e.error, chunk);
      idx++; next();
    };
    speechSynthesis.speak(u);
  }
  next();
}

function speak(text, onDone) {
  if (!selectedVoice) loadVoices();
  _stopRequested = false;
  speechSynthesis.cancel();
  _speakQueue = [];
  _speakBusy = false;
  _speakQueue.push({ text, onDone });
  setTimeout(_processQueue, 50);
}

function speakQueued(text, onDone) {
  if (!selectedVoice) loadVoices();
  _speakQueue.push({ text, onDone });
  _processQueue();
}


// ── DATE ──
function setDate() {
  const d = new Date();
  const days = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  const months = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
  document.getElementById('dateDisplay').innerHTML = `${days[d.getDay()]}<span>, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}</span>`;
}

// ── WEATHER ──
async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.68&longitude=12.57&current=temperature_2m,weathercode&timezone=Europe/Copenhagen');
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const descs = {0:'klart vejr',1:'let skyet',2:'skyet',3:'overskyet',45:'tåge',61:'let regn',63:'regn',71:'let sne',80:'byger'};

async function renderCalendarView() {
  const list = document.getElementById('calendarList');
  list.innerHTML = '<div class="cal-loading">Henter kalender...</div>';
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'upcoming_14' })
    });
    const data = await res.json();
    const events = data.items || [];

    if (events.length === 0) {
      list.innerHTML = '<div class="cal-empty">Ingen kommende aftaler</div>';
      return;
    }

    // Group by date
    const groups = {};
    events.forEach(e => {
      const dateKey = (e.start.dateTime || e.start.date).split('T')[0];
      if (!groups[dateKey]) groups[dateKey] = [];
      groups[dateKey].push(e);
    });

    const todayStr = new Date().toISOString().split('T')[0];
    const tomorrowStr = (() => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; })();

    let html = '';
    Object.keys(groups).sort().forEach(dateKey => {
      const isToday = dateKey === todayStr;
      const isTomorrow = dateKey === tomorrowStr;
      const d = new Date(dateKey + 'T12:00:00');
      let label;
      if (isToday) label = 'I dag';
      else if (isTomorrow) label = 'I morgen';
      else label = d.toLocaleDateString('da', { weekday:'long', day:'numeric', month:'long' });
      label = label.charAt(0).toUpperCase() + label.slice(1);

      html += `<div class="cal-day-group">
        <div class="cal-day-header${isToday ? ' today' : ''}">${label}</div>`;

      groups[dateKey].forEach(e => {
        const isAllDay = !!e.start.date;
        let timeStr = '', durationStr = '';
        let dotClass = isToday ? 'today' : '';
        if (!isAllDay) {
          const start = new Date(e.start.dateTime);
          const end = new Date(e.end.dateTime);
          timeStr = start.toLocaleTimeString('da', { hour:'2-digit', minute:'2-digit' });
          const mins = Math.round((end - start) / 60000);
          durationStr = mins >= 60 ? `${Math.floor(mins/60)}t${mins%60 ? ' '+mins%60+'m' : ''}` : `${mins}m`;
        } else {
          timeStr = 'Hele<br>dagen';
        }
        html += `<div class="cal-event" onclick="speakEvent('${esc(e.summary)}', '${timeStr.replace('<br>',' ')}')">
          <div class="cal-event-time${isAllDay ? ' allday' : ''}">${timeStr}</div>
          <div class="cal-event-dot ${dotClass}"></div>
          <div class="cal-event-info">
            <div class="cal-event-title">${esc(e.summary)}</div>
            ${durationStr ? `<div class="cal-event-duration">${durationStr}</div>` : ''}
          </div>
        </div>`;
      });
      html += '</div>';
    });

    list.innerHTML = html;
  } catch(err) {
    list.innerHTML = '<div class="cal-empty">Kunne ikke hente kalender</div>';
  }
}

// Words that mean "stop what you're doing"
const STOP_WORDS = ['stop', 'hold op', 'nok', 'stilhed', 'quiet', 'shut up', 'enough', 'lad være'];

function isStopCommand(text) {
  const t = text.toLowerCase().trim();
  return STOP_WORDS.some(w => t === w || t.startsWith(w + ' ') || t.endsWith(' ' + w));
}

    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);

  const weekday = copenhagenWeekday;

// Show multiple email addresses as a tap list
function showEmailChoiceCard(name, emails, onPick, onCancel) {
  const card = document.getElementById('confirmCard');
  const lbl = document.getElementById('confirmLabel');
  const body = document.getElementById('confirmCardBody');
  if (!card) return;
  lbl.textContent = name;
  const btns = emails.map((email, i) => `
    <button class="email-choice-btn" onclick="emailChoicePick(${i})">
      <div class="email-choice-addr">${esc(email)}</div>
    </button>`).join('');
  body.innerHTML = `
    <div class="email-choice-list">${btns}</div>
    <button class="email-choice-cancel" onclick="emailChoiceCancel()">✕ Annuller</button>`;
  card.style.display = 'block';
  window._emailChoiceEmails = emails;
  window._emailChoiceOnPick = onPick;
  window._emailChoiceOnCancel = onCancel;
}

function emailChoicePick(idx) {
  const email = window._emailChoiceEmails[idx];
  const onPick = window._emailChoiceOnPick;
  hideConfirmCard();
  if (onPick) onPick(email);
}

function emailChoiceCancel() {
  const onCancel = window._emailChoiceOnCancel;
  hideConfirmCard();
  if (onCancel) onCancel();
  else {
    const msg = 'Ok, annulleret.';
    saveToHistory('assistant', msg);
    speak(msg);
  }
}

function hideConfirmCard() {
  const card = document.getElementById('confirmCard');
  if (card) card.style.display = 'none';
  window._confirmYes = null;
  window._confirmNo = null;
  window._emailChoiceEmails = null;
  window._emailChoiceOnPick = null;
}

function confirmCardYes() {
  hideConfirmCard();
  if (window._confirmYes) window._confirmYes();
}

function confirmCardNo() {
  hideConfirmCard();
  stopSpeaking();
  if (window._confirmNo) window._confirmNo();
  else {
    const msg = 'Ok, cancelled.';
    saveToHistory('assistant', msg);
    speak(msg);
  }
}

async function executeAction(action) {
  console.log('Executing action:', action);
  if (action.type === 'create_project') {
    const { data, error } = await sb.from('projects').insert({ name: action.name }).select();
    if (!error && data && data.length > 0) {
      await loadProjects();
      setTimeout(() => openProject(data[0]), 300);
    } else {
      console.log('Create project error:', error);
    }
  } else if (action.type === 'open_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) setTimeout(() => openProject(p), 300);
  } else if (action.type === 'delete_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) {
      // Delete all messages for this project first
      await sb.from('messages').delete().eq('project_id', p.id);
      await sb.from('projects').delete().eq('id', p.id);
      if (activeProject && activeProject.id === p.id) goHome();
      await loadProjects();
    }
  } else if (action.type === 'connect_calendar') {
    window.location.href = '/api/google-auth?force=true';
  } else if (action.type === 'list_upcoming') {
    const waitAndList = () => {
      if (isSpeaking) { setTimeout(waitAndList, 300); return; }
      listUpcomingEvents();
    };
    setTimeout(waitAndList, 500);
  } else if (action.type === 'list_date') {
    const d = action.date, tf = action.time_from, tt = action.time_to;
    const waitAndList = () => {
      if (isSpeaking) { setTimeout(waitAndList, 300); return; }
      listDateEvents(d, tf, tt);
    };
    setTimeout(waitAndList, 500);
  } else if (action.type === 'find_event') {
    const waitAndFind = () => {
      if (isSpeaking) { setTimeout(waitAndFind, 300); return; }
      findCalendarEvent(action.query);
    };
    setTimeout(waitAndFind, 500);
  } else if (action.type === 'delete_multiple_events') {
    const ids = action.event_ids || [];
    let deleted = 0;
    for (const id of ids) {
      try {
        const res = await fetch('/api/google-calendar', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'delete', event: { event_id: id } })
        });
        const data = await res.json();
        if (!data.error) deleted++;
        else console.log('Failed to delete:', id, data.error);
      } catch(e) { console.log('Failed to delete:', id, e); }
    }
    const msg = `Deleted ${deleted} event${deleted !== 1 ? 's' : ''}.`;
    saveToHistory('assistant', msg);
    speak(msg);
  } else if (action.type === 'delete_event') {
    if (action.event_id) {
      await deleteCalendarEvent(action.event_id);
    } else if (action.query || action.title) {
      const q = action.query || action.title;
      await findCalendarEvent(q, true);
      if (lastFoundEvents.length === 1) {
        await deleteCalendarEvent(lastFoundEvents[0].id);
      } else if (lastFoundEvents.length > 1) {
        speak(`I found ${lastFoundEvents.length} events matching that. Please be more specific.`);
      } else {
        speak(`I could not find an event called "${q}".`);
      }
    } else {
      speak("I could not identify that event. Please say the event name.");
    }
  } else if (action.type === 'update_event') {
    if (action.event_id) {
      await updateCalendarEvent(action.event_id, action.new_title, action.new_date, action.new_time, action.new_duration, action.description);
    } else {
      speak("I could not identify that event. Please try again.");
    }
  } else if (action.type === 'list_calendar') {
    // Wait for Claude to finish speaking before reading calendar
    const waitAndList = () => {
      if (isSpeaking) { setTimeout(waitAndList, 300); return; }
      listCalendarEvents();
    };
    setTimeout(waitAndList, 500);
  } else if (action.type === 'create_event_and_invite') {
    // Create event then find contact and send invite
    await createCalendarEvent(action.title, action.date, action.time, action.duration, false, false);
    if (action.invite_to) {
      window._pendingInvite = {
        title: action.title,
        date: action.date,
        time: action.time,
        duration: action.duration || 60
      };
      await findContact(action.invite_to, 
        `Mødeindkaldelse: ${action.title}`,
        buildInviteBody(action.title, action.date, action.time, action.duration || 60)
      );
    }
  } else if (action.type === 'create_multiple_events') {
    const events = action.events || [];
    let created = 0;
    for (const e of events) {
      try {
        await createCalendarEvent(e.title, e.date, e.time, e.duration || 60, e.allday, e.reminder || false, e.description || '', true);
        created++;
      } catch(err) { console.log('Failed to create event:', e.title, err); }
    }
    const msg = `Done. Added ${created} event${created !== 1 ? 's' : ''} to your calendar.`;
    saveToHistory('assistant', msg);
    speak(msg);
  } else if (action.type === 'create_event') {
    await createCalendarEvent(action.title, action.date, action.time, action.duration, action.allday, action.reminder, action.description || '');
  } else if (action.type === 'find_contact') {
    await findContact(action.query, action.subject, action.body);
  } else if (action.type === 'send_confirmed_email') {
    if (window._confirmedEmail) {
      await sendEmail(window._confirmedEmail, action.subject, action.body);
      window._confirmedEmail = null;
      window._foundContacts = null;
    }
  } else if (action.type === 'spell_email') {
    // User spelled out an email address — confirm and send
    if (window._pendingEmail) {
      const email = action.email;
      const name = window._pendingContactQuery || email;
      window._foundContacts = [{ name, emails: [email] }];
      const msg = `Got it. I'll send to ${speakableEmail(email)}. Shall I send?`;
      saveToHistory('assistant', msg);
      speak(msg);
    }
  } else if (action.type === 'confirm_email') {
    if (window._foundContacts) {
      const idx = (action.index || 1) - 1;
      const contact = window._foundContacts[idx];
      if (contact) {
        const draft = window._pendingEmailDraft || {};
        if (draft.subject && draft.body) {
          // We already have content — wait for speech then send
          window._pendingEmail = null;
          window._pendingEmailDraft = null;
          const emailTo = contact.emails[0];
          window._foundContacts = null;
          hideConfirmCard();
          const waitAndSend = () => {
            if (isSpeaking) { setTimeout(waitAndSend, 300); return; }
            sendEmail(emailTo, draft.subject, draft.body);
          };
          setTimeout(waitAndSend, 300);
        } else {
          // Address confirmed — ask for content
          window._confirmedEmail = contact.emails[0];
          window._foundContacts = null;
          hideConfirmCard();
          const msg = `Got it. What should the email say?`;
          saveToHistory('assistant', msg);
          speak(msg);
        }
      }
    }
  } else if (action.type === 'send_email') {
    // Always search contacts if address looks fake/guessed (example.com, placeholder, no real domain)
    const looksReal = action.to && action.to.includes('@') && 
      !action.to.includes('example.com') && 
      !action.to.includes('placeholder') &&
      action.to.split('@')[1]?.includes('.');
    if (!looksReal) {
      // Extract name from fake address or use as-is
      const query = action.to?.includes('@') 
        ? action.to.split('@')[0].replace(/[._]/g,' ') 
        : action.to;
      await findContact(query, action.subject, action.body);
    } else {
      await sendEmail(action.to, action.subject, action.body);
    }
  } else if (action.type === 'read_inbox') {
    const waitAndRead = () => {
      if (isSpeaking) { setTimeout(waitAndRead, 300); return; }
      readInbox();
    };
    setTimeout(waitAndRead, 500);
  } else if (action.type === 'read_email') {
    const waitAndRead = () => {
      if (isSpeaking) { setTimeout(waitAndRead, 300); return; }
      readEmail(action.message_id);
    };
    setTimeout(waitAndRead, 500);
  } else if (action.type === 'open_drive_folder') {
    // Refresh drive context for current project
    if (activeProject) {
      await fetchDriveContext(activeProject.name);
      const msg = driveFiles.length > 0
        ? `Found ${driveFiles.length} file${driveFiles.length>1?'s':''} in the ${activeProject.name} folder: ${driveFiles.map(f=>f.name).join(', ')}.`
        : `The ${activeProject.name} Drive folder is empty. Add files in Google Drive under Vox/${activeProject.name}.`;
      saveToHistory('assistant', msg);
      speak(msg);
    }
  } else if (action.type === 'go_home') {
    goHome();
  }
}

async function listCalendarEvents(date) {
  try {
    const action = date ? 'list_date' : 'list';
    const res = await fetch('/api/google-calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, date })
    });
    const data = await res.json();
    if (data.error) { speak('Calendar error: ' + data.error); return; }
    const events = data.items || [];
    const dayLabel = date ? new Date(date).toLocaleDateString('en', {weekday:'long'}) : 'today';
    let msg;
    if (events.length === 0) {
      msg = date ? `You have no events on ${dayLabel}.` : "You have no more events today.";
    } else {
      const summary = events.map(e => {
        const time = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}) : 'All day';
        return `${time}, ${e.summary}`;
      }).join('. ');
      msg = `On ${dayLabel} you have ${events.length} event${events.length > 1 ? 's' : ''}. ${summary}.`;
    }
    saveToHistory('assistant', msg);
    speak(msg);
  } catch(e) { speak('Could not load calendar events.'); }
}

async function createCalendarEvent(title, date, time, duration, allday, reminder, description, silent = false) {
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'create', event: { title, date, time, duration, allday, reminder, description } })
    });
    const data = await res.json();
    if (!silent) {
      if (data.id) speak(`Done. ${title} has been added to your calendar.`);
      else speak('Could not create the event. Please try again.');
    }
    return data;
  } catch(e) {
    if (!silent) speak('Could not create calendar event.');
    throw e;
  }
}

async function listDateEvents(date, timeFrom, timeTo) {
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'list_date', date, time_from: timeFrom, time_to: timeTo })
    });
    const data = await res.json();
    const events = data.items || [];
    const dayLabel = new Date(date + 'T12:00:00').toLocaleDateString('en', { weekday: 'long', month: 'long', day: 'numeric' });
    const timeLabel = timeFrom ? ` between ${timeFrom} and ${timeTo || 'end of day'}` : '';
    if (events.length === 0) {
      const noMsg = `You have no events on ${dayLabel}${timeLabel}.`;
      saveToHistory('assistant', noMsg);
      speak(noMsg);
      return;
    }
    const summary = events.map(e => {
      const time = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' }) : 'All day';
      return `${time}, ${e.summary}`;
    }).join('. ');
    const msg = `On ${dayLabel}${timeLabel} you have ${events.length} event${events.length > 1 ? 's' : ''}. ${summary}.`;
    saveToHistory('assistant', msg);
    speak(msg);
  } catch(e) { speak('Could not load events for that day.'); }
}

async function listUpcomingEvents() {
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'upcoming' })
    });
    const data = await res.json();
    const events = data.items || [];
    if (events.length === 0) { saveToHistory('assistant', "You have no upcoming events this week."); speak("You have no upcoming events this week."); return; }
    const summary = events.map(e => {
      const d = new Date(e.start.dateTime || e.start.date);
      const day = d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
      const time = e.start.dateTime ? d.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' }) : '';
      return `${day}${time ? ' at ' + time : ''}: ${e.summary}`;
    }).join('. ');
    const msg = `You have ${events.length} upcoming events. ${summary}.`;
    saveToHistory('assistant', msg);
    speak(msg);
  } catch(e) { speak('Could not load upcoming events.'); }
}

// Store last found events for follow-up delete/edit
let lastFoundEvents = [];

async function loadTodayEventsForContext() {
  try {

      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'list' })
    });

    console.log('Loaded today events for context:', lastFoundEvents.map(e => e.summary));
  } catch(e) { console.error('Could not load today events:', e); }
}

async function findCalendarEvent(query, silent = false) {
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'search', event: { query } })
    });
    const data = await res.json();
    lastFoundEvents = data.items || [];
    if (silent) return; // Used internally before update/delete
    if (lastFoundEvents.length === 0) { speak(`I could not find any event matching "${query}".`); return; }
    if (lastFoundEvents.length === 1) {
      const e = lastFoundEvents[0];
      const time = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' }) : '';
      speak(`Found: ${e.summary}${time ? ' at ' + time : ''}. Say delete it or tell me how to update it.`);
    } else {
      const names = lastFoundEvents.slice(0,3).map(e => e.summary).join(', ');
      speak(`Found ${lastFoundEvents.length} events: ${names}. Please be more specific.`);
    }
  } catch(e) { speak('Could not search calendar.'); }
}

async function deleteCalendarEvent(eventId) {
  try {
    // If no eventId but we have lastFoundEvents, use the first one
    const id = eventId || (lastFoundEvents[0] && lastFoundEvents[0].id);
    if (!id) { speak('I do not know which event to delete. Please say find event first.'); return; }
    const eventName = lastFoundEvents[0] ? lastFoundEvents[0].summary : 'the event';
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', event: { id } })
    });
    const data = await res.json();
    if (data.success) { lastFoundEvents = []; speak(`Done. ${eventName} has been deleted from your calendar.`); }
    else speak('Could not delete the event. Please try again.');
  } catch(e) { speak('Could not delete the event.'); }
}

async function updateCalendarEvent(eventId, newTitle, newDate, newTime, newDuration, description) {
  try {
    if (!eventId) { speak('I do not know which event to update.'); return; }
    const updates = {};
    if (newTitle) updates.summary = newTitle;
    if (description) updates.description = description;
    if (newDate || newTime) {
      // We need the original event to preserve unchanged fields
      const getRes = await fetch('/api/google-calendar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get', event: { id: eventId } })
      });
      const original = await getRes.json();
      const origStart = original.start?.dateTime || original.start?.date || '';
      const startDate = newDate || origStart.split('T')[0];
      const startTime = newTime || (origStart.includes('T') ? origStart.split('T')[1].substring(0,5) : '09:00');
      const duration = newDuration || 60;
      const start = new Date(`${startDate}T${startTime}:00`);
      const end = new Date(start.getTime() + duration * 60000);
      updates.start = { dateTime: start.toISOString(), timeZone: 'Europe/Copenhagen' };
      updates.end = { dateTime: end.toISOString(), timeZone: 'Europe/Copenhagen' };
    }
    const res = await fetch('/api/google-calendar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', event: { id: eventId, updates } })
    });
    const data = await res.json();
    if (data.id) speak(`Done. The event has been updated.`);
    else speak('Could not update the event. Please try again.');
  } catch(e) { console.error('Update error:', e); speak('Could not update the event.'); }
}

// ── GMAIL ──
// Convert email address to speakable text — NO dots (they break sentence splitter)
function speakableEmail(email) {
  if (!email) return '';
  const [user, domain] = email.split('@');
  if (!domain) return email;
  const domainClean = domain.replace(/\./g, ' dot ');
  const userSpoken = user.length <= 5
    ? user.toUpperCase().split('').join(' ')
    : user.replace(/[._-]/g, ' ');
  return `${userSpoken} at ${domainClean}`;
}

// Build a meeting invite email body
function buildInviteBody(title, date, time, duration) {
  const d = new Date(`${date}T${time || '09:00'}:00`);
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  const dateStr = d.toLocaleDateString('da-DK', options);
  const timeStr = time || '09:00';
  const endDate = new Date(d.getTime() + duration * 60000);
  const endTime = endDate.toTimeString().substring(0, 5);
  return `Hej,

Jeg vil gerne invitere dig til følgende møde:

Emne: ${title}
Dato: ${dateStr}
Tidspunkt: ${timeStr} - ${endTime}

Ses vi?

Venlig hilsen
Martin`;
}

// Pending email state for contact confirmation flow
window._pendingEmail = null;
window._foundContacts = null;

async function findContact(query, subject, body) {
  console.log('findContact called with query:', query);
  try {
    const res = await fetch('/api/gmail', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'find_contact', query })
    });
    console.log('findContact HTTP status:', res.status);
    const data = await res.json();
    console.log('findContact response:', JSON.stringify(data));
    const contacts = data.contacts || [];

    // Clean up garbled name from email headers
    contacts.forEach(c => {
      c.name = c.name.replace(/^["\\ ]+|["\\ ]+$/g, '').trim();
    });

    if (contacts.length === 0) {
      window._pendingEmail = { subject, body };
      window._pendingContactQuery = query;
      const msg = `I could not find anyone named ${query}. Please say their email address.`;
      saveToHistory('assistant', msg);
      speakQueued(msg);
      return;
    }

    // Store pending email — but NOT subject/body yet, confirm address first
    window._pendingEmail = { subject: '', body: '' };
    window._pendingEmailDraft = { subject, body };
    window._foundContacts = contacts;
    window._awaitingEmailContent = false;

    let msg;
    // Flatten: one entry per email address
    const flat = [];
    contacts.forEach(c => {
      (c.emails || []).forEach(e => flat.push({ name: c.name || e, email: e }));
    });

    if (flat.length === 1) {
      msg = `I found ${flat[0].name}. Is this the right address?`;
      saveToHistory('assistant', msg);
      speakQueued(msg, () => {
        // Show confirm card after speech
        showConfirmCard(
          `Send mail til ${flat[0].name}`,
          flat[0].email,
          () => {
            // Yes — confirm
            window._confirmedEmail = flat[0].email;
            window._foundContacts = null;
            hideConfirmCard();
            const doneMsg = `Got it. What should the email say?`;
            saveToHistory('assistant', doneMsg);
            speak(doneMsg);
          },
          () => {
            // No — ask to spell
            window._foundContacts = null;
            hideConfirmCard();
            const noMsg = `Ok. Please say the correct email address.`;
            saveToHistory('assistant', noMsg);
            speak(noMsg);
          }
        );
      });
    } else {
      // Multiple emails found — group by person name, show all as tap list
      // Deduplicate: if same person appears with multiple emails, group them
      const byName = {};
      flat.forEach(c => {
        const key = c.name.toLowerCase();
        if (!byName[key]) byName[key] = { name: c.name, emails: [] };
        if (!byName[key].emails.includes(c.email)) byName[key].emails.push(c.email);
      });
      const grouped = Object.values(byName);

      // Collect all emails with labels for the choice card
      const allEmails = [];
      grouped.forEach(g => g.emails.forEach(e => allEmails.push(e)));

      // Store for voice fallback
      window._foundContacts = allEmails.map(e => ({ name: flat.find(f=>f.email===e)?.name||e, emails: [e] }));

      const personName = grouped[0].name;
      msg = `I found ${allEmails.length} addresses for ${personName}. Tap the right one.`;
      saveToHistory('assistant', msg);
      speakQueued(msg, () => {
        showEmailChoiceCard(
          personName,
          allEmails,
          (chosenEmail) => {
            // User tapped an address
            window._confirmedEmail = chosenEmail;
            window._foundContacts = null;
            const draft = window._pendingEmailDraft || {};
            if (draft.subject && draft.body) {
              sendEmail(chosenEmail, draft.subject, draft.body);
              window._pendingEmailDraft = null;
            } else {
              const doneMsg = 'Got it. What should the email say?';
              saveToHistory('assistant', doneMsg);
              speak(doneMsg);
            }
          },
          () => {
            window._foundContacts = null;
            const cancelMsg = 'Ok, cancelled.';
            saveToHistory('assistant', cancelMsg);
            speak(cancelMsg);
          }
        );
      });
    }
  } catch(e) { speak('Could not search contacts.'); }
}

async function sendEmail(to, subject, body) {
  try {
    const res = await fetch('/api/gmail', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'send', to, subject, body })
    });
    const data = await res.json();
    if (data.id) {
      const name = to.split('@')[0];
      const msg = `Email sent.`;
      saveToHistory('assistant', msg);
      speak(msg);
    } else {
      speak('Could not send the email. ' + (data.error || 'Please try again.'));
    }
  } catch(e) { speak('Could not send the email.'); }
}

async function readInbox() {
  try {
    const res = await fetch('/api/gmail', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'list' })
    });
    const data = await res.json();
    const messages = data.messages || [];
    if (messages.length === 0) { speak('Your inbox is empty.'); return; }
    const summary = messages.map((m, i) => {
      const from = m.from.replace(/<.*>/, '').trim() || m.from;
      return `${i + 1}. From ${from}: ${m.subject}`;
    }).join('. ');
    const msg = `You have ${messages.length} recent emails. ${summary}.`;
    saveToHistory('assistant', msg);
    // Store message IDs for follow-up
    window._lastInboxMessages = messages;
    speak(msg);
  } catch(e) { speak('Could not load your inbox.'); }
}

async function readEmail(messageId) {
  try {
    const res = await fetch('/api/gmail', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get', messageId })
    });
    const data = await res.json();
    if (data.body) {
      const msg = `Email from ${data.from}. Subject: ${data.subject}. ${data.body.substring(0, 500)}`;
      saveToHistory('assistant', msg);
      speak(msg);
    } else {
      speak('Could not read that email.');
    }
  } catch(e) { speak('Could not read that email.'); }
}

// ── VOICE COMMANDS ──
function handleCommand(text) {
  const t = text.toLowerCase();
  setTranscript(text);

  if (t.includes('morgenoverblik') || t.includes('morning brief') || t.includes('godmorgen')) { playMorningBrief(); return; }
  if ((t.includes('gå hjem') || t.includes('tilbage') || t.includes('hjem')) && activeProject) { goHome(); speak('Going home.'); return; }

  // If already in a project, don't navigate — send to Claude instead
  if (activeProject) {
    sendToClaude(text);
    return;
  }

  // From home screen: check if user said a project name to navigate
  for (const p of projects) {
    if (t.includes(p.name.toLowerCase())) {
      openProject(p);
      speak(`Opening ${p.name}.`);
      return;
    }
  }

  // Direct reconnect bypass
  if (t.includes('reconnect') || t.includes('forbind igen') || t.includes('connect again')) {
    window.location.href = '/api/google-auth?force=true';
    return;
  }

  // No project match — send to Claude from home
  sendToClaude(text);
}

// ── PUSH TO TALK ──
let micTranscript = ''; // Accumulates across restarts

function startListening() {
  if (isThinking) return;
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setMicHint('Stemme ikke understøttet — brug Safari');
    return;
  }
  if (isSpeaking || _speakBusy) stopSpeaking();
  isListening = true;
  micTranscript = '';
  setMicState('listening');
  setMicHint('Tryk igen for at sende');
  setTranscript('');
  _startRecognitionInstance();
}

function _startRecognitionInstance() {
  if (!isListening) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'da-DK';
  recognition.interimResults = true;
  recognition.continuous = true;

  recognition.onresult = e => {
    let interim = micTranscript;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) micTranscript += e.results[i][0].transcript + ' ';
      else interim = micTranscript + e.results[i][0].transcript;
    }
    const t = interim.trim();
    setTranscript(t);
    setLiveTranscript(t);
  };

  recognition.onend = () => {
    recognition = null;
    if (isListening) {
      // iOS killed it — restart silently to keep mic open
      setTimeout(_startRecognitionInstance, 100);
    }
  };

  recognition.onerror = e => {
    recognition = null;
    if (e.error === 'not-allowed') {
      isListening = false;
      setMicState('idle');
      setMicHint('Mikrofon ikke tilladt — tjek indstillinger');
    } else if (isListening) {
      // Restart on other errors
      setTimeout(_startRecognitionInstance, 200);
    }
  };

  try {
    recognition.start();
  } catch(e) {
    console.log('Recognition start error:', e);
    if (isListening) setTimeout(_startRecognitionInstance, 300);
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    try { recognition.stop(); } catch {}
    recognition = null;
  }
  const transcript = micTranscript.trim();
  micTranscript = '';
  setLiveTranscript(''); // clear live bubble
  return transcript;
}

function handleMicTap() {
  // Interrupt speech
  if (isSpeaking || _speakBusy || _speakQueue.length > 0) {
    stopSpeaking();
    return;
  }
  if (isThinking) return;
  if (isListening) {
    const transcript = stopListening();
    if (transcript && transcript.length > 1) {
      handleCommand(transcript);
    } else {
      setMicState('idle');
      setMicHint('Tryk for at tale');
    }
    return;
  }
  startListening();
}

// ── PAGE VISIBILITY — stop mic when app goes to background ──
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopListening();
    stopSpeaking();
    setMicState('idle');
    setMicHint('Tryk for at tale');
  }
});

window.addEventListener('blur', () => {
  stopListening();
  setMicState('idle');
  setMicHint('Tryk for at tale');
});

window.addEventListener('pagehide', () => {
  stopListening();
  stopSpeaking();
});

// ── iOS AUDIO UNLOCK via splash ──
function startApp() {
  // 1. Unlock AudioContext with user gesture
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    setTimeout(() => ctx.close(), 200);
  } catch(e) { console.log('AudioContext error:', e); }

  // 2. Unlock speechSynthesis with silent utterance
  try {
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    speechSynthesis.speak(u);
  } catch(e) {}

  // 3. Load voices
  loadVoices();
  setTimeout(loadVoices, 300);
  setTimeout(loadVoices, 1000);

  // 4. Hide splash, show app
  document.getElementById('splashScreen').style.display = 'none';

  // 5. Init app
  init();
}



// ── UI ──
function setMicState(state) {
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  btn.className = 'mic-outer';
  if (state === 'listening') { btn.classList.add('listening'); status.textContent = 'Lytter'; }
  else if (state === 'thinking') { btn.classList.add('thinking'); status.textContent = 'Tænker'; }
  else if (state === 'speaking') { btn.classList.add('speaking'); status.textContent = 'Svarer'; }
  else { btn.classList.add('idle'); status.textContent = 'Lytter'; }
}
function setTranscript(t) { document.getElementById('transcriptBox').textContent = t; }
function setMicHint(t) { document.getElementById('micHint').textContent = t; }

// ── MORNING BRIEF ──
async function playMorningBrief() {
  if (recognition) try { recognition.stop(); } catch {}
  isListening = false;
  const weather = await fetchWeather();
  const d = new Date();
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const pNames = projects.map(p => p.name).join(', ');
  const brief = `Good morning Martin. Today is ${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]}. Weather in Denmark: ${weather}. You have ${projects.length} active projects: ${pNames}. What would you like to start with today?`;
  speak(brief);
}

// ── INIT ──
async function init() {
  setDate();
  fetchWeather();
  await loadProjects();
  setMicState('idle');
  setMicHint('Tryk for at tale');

  // Check if returning from Google OAuth
  const params = new URLSearchParams(window.location.search);
  if (params.get('calendar') === 'connected') {
    calendarConnected = true;
    window.history.replaceState({}, '', '/');
    speak('Google Calendar is now connected.');
  } else if (params.get('calendar') === 'error') {
    window.history.replaceState({}, '', '/');
    speak('Could not connect Google Calendar. Please try again.');
  }
}
// On iOS/Safari: show splash and wait for tap to unlock audio
// On desktop: start immediately
if (isIOS || isSafari) {
  document.getElementById('splashScreen').style.display = 'flex';
} else {
  document.getElementById('splashScreen').style.display = 'none';
  init();
}
