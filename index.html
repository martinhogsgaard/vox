<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vox</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#f2f2f7; --card:#fff; --border:#e5e5ea; --label:#8e8e93; --text:#1c1c1e; --r:12px; --rs:8px; }
html,body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); max-width:390px; margin:0 auto; display:flex; flex-direction:column; height:100dvh; }

.header { padding:52px 20px 12px; flex-shrink:0; }
.date-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:2px; }
.date-main { font-size:22px; font-weight:600; letter-spacing:-.3px; }
.date-main span { font-weight:300; color:var(--label); }
.divider { height:1px; background:var(--border); margin:0 20px; flex-shrink:0; }

.content { flex:1; overflow-y:auto; padding:14px 20px 0; display:flex; flex-direction:column; gap:14px; }
.section-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:8px; }

.brief-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.brief-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); }
.brief-item:last-child { border-bottom:none; }
.brief-item svg { width:16px; height:16px; stroke:var(--text); fill:none; stroke-width:1.6; flex-shrink:0; }
.brief-title { flex:1; font-size:14px; font-weight:500; }
.brief-sub { font-size:12px; color:var(--label); }
.play-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; width:100%; cursor:pointer; margin-top:8px; }
.play-btn svg { width:14px; height:14px; fill:white; }

.projects-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.project-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
.project-item:last-child { border-bottom:none; }
.project-item svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; flex-shrink:0; }
.project-name { flex:1; font-size:14px; font-weight:500; }
.project-arrow { font-size:16px; color:var(--label); }
.new-project { display:flex; align-items:center; padding:10px 14px; gap:10px; cursor:pointer; border-top:1px solid var(--border); }
.new-project svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; }
.new-project span { font-size:14px; color:var(--label); }

.chat-area { display:flex; flex-direction:column; gap:8px; }
.bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; max-width:85%; }
.bubble.user { background:var(--text); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.bubble.assistant { background:var(--card); color:var(--text); align-self:flex-start; border:1px solid var(--border); border-bottom-left-radius:4px; }
.back-btn { font-size:13px; color:var(--label); cursor:pointer; padding:4px 0; margin-bottom:8px; }

/* TRANSCRIPT */
.transcript-box { background:var(--card); border:1px solid var(--border); border-radius:var(--rs); padding:8px 14px; font-size:13px; color:var(--label); font-style:italic; margin:8px 20px; text-align:center; min-height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

/* MIC */
.mic-section { display:flex; flex-direction:column; align-items:center; padding:6px 0 8px; flex-shrink:0; }
.mic-status { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:10px; }
.mic-outer { width:76px; height:76px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .25s; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.mic-outer svg { width:30px; height:30px; stroke:var(--text); fill:none; stroke-width:1.5; transition:stroke .25s; }
.mic-outer.idle { animation:idlePulse 3s infinite ease-in-out; }
@keyframes idlePulse { 0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.06)} 50%{box-shadow:0 2px 18px rgba(0,0,0,.13)} }
.mic-outer.listening { background:var(--text); border-color:var(--text); animation:listenPulse 1.2s infinite; }
.mic-outer.listening svg { stroke:#fff; }
@keyframes listenPulse { 0%,100%{box-shadow:0 0 0 10px rgba(28,28,30,.09),0 0 0 20px rgba(28,28,30,.04)} 50%{box-shadow:0 0 0 16px rgba(28,28,30,.06),0 0 0 30px rgba(28,28,30,.02)} }
.mic-outer.thinking svg { stroke:var(--label); }
.mic-outer.speaking { animation:speakPulse .9s infinite ease-in-out; }
@keyframes speakPulse { 0%,100%{box-shadow:0 0 0 6px rgba(28,28,30,.05)} 50%{box-shadow:0 0 0 14px rgba(28,28,30,.03)} }
.mic-hint { font-size:11px; color:var(--label); margin-top:8px; text-align:center; min-height:16px; }

/* BOTTOM NAV */
.bottom-nav { background:rgba(242,242,247,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding:8px 0 24px; flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; cursor:pointer; }
.nav-item svg { width:22px; height:22px; stroke:var(--label); fill:none; stroke-width:1.5; }
.nav-item.active svg { stroke:var(--text); }
.nav-label { font-size:9px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; color:var(--label); }
.nav-item.active .nav-label { color:var(--text); }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:390px; }
.modal-title { font-size:17px; font-weight:600; margin-bottom:16px; }
.modal-input { width:100%; border:1px solid var(--border); border-radius:var(--rs); padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:15px; outline:none; background:var(--bg); }
.modal-btn { width:100%; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:13px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; margin-top:12px; cursor:pointer; }
.modal-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:15px; margin-top:8px; cursor:pointer; padding:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="date-label">I DAG</div>
  <div class="date-main" id="dateDisplay">Indlæser...</div>
</div>
<div class="divider"></div>

<!-- HOME -->
<div class="content" id="homeView">
  <div>
    <div class="section-label">Morgenoverblik</div>
    <div class="brief-card">
      <div class="brief-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <div class="brief-title">Vejr</div>
        <div class="brief-sub" id="weatherSub">Henter...</div>
      </div>
      <div class="brief-item">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <div class="brief-title">Projekter</div>
        <div class="brief-sub" id="projectsSub">Henter...</div>
      </div>
    </div>
    <button class="play-btn" onclick="playMorningBrief()">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>

  <div>
    <div class="section-label">Projekter</div>

</div>

<!-- PROJECT VIEW -->
<div class="content" id="projectView" style="display:none;">
  <div>
    <div class="back-btn" onclick="goHome()">‹ Hjem</div>
    <div class="section-label" id="projectViewLabel">Samtale</div>
    <div class="chat-area" id="chatArea"></div>
  </div>
</div>

<!-- TRANSCRIPT -->
<div class="transcript-box" id="transcriptBox">Tryk på mikrofon for at tale</div>

<!-- MIC -->
<div class="mic-section">
  <div class="mic-status" id="micStatus">Lytter</div>
  <div class="mic-outer idle" id="micBtn" onclick="handleMicTap()">
    <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>
  </div>
  <div class="mic-hint" id="micHint">Altid lyttende</div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span class="nav-label">Hjem</span>
  </div>
  <div class="nav-item" onclick="goHome()">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    <span class="nav-label">Projekter</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">Kalender</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Konto</span>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Nyt projekt</div>
    <input class="modal-input" id="newProjectName" placeholder="Projektnavn..."/>
    <button class="modal-btn" onclick="createProject()">Opret</button>
    <button class="modal-cancel" onclick="closeModal()">Annuller</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kahpdsismxckxljddxya.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthaHBkc2lzbXhja3hsamRkeHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzE1OTMsImV4cCI6MjA4ODQwNzU5M30.KzFNs2rhbatc4u8Ec1ZcfDVKykZnkLfV2K_cvSakSxc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let activeProject = null;
let conversationHistory = [];
let projects = [];
let isListening = false;
let isSpeaking = false;
let isThinking = false;
let recognition = null;
let hasSeeded = false;
let selectedVoice = null;
let calendarConnected = false;

// ── VOICE ──
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  // Google Natural voices sound most human — prioritize them
  const priority = [
    'Google UK English Male',
    'Google US English 1 (Natural)',
    'Google US English 2 (Natural)',
    'Google US English 3 (Natural)',
    'Google UK English Female',
    'Daniel',
    'Alex',
    'Samantha'
  ];
  for (const name of priority) {
    const v = voices.find(v => v.name === name);
    if (v) { selectedVoice = v; return; }
  }
  selectedVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
}
speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 200);
setTimeout(loadVoices, 1000);

function speak(text, onDone) {
  speechSynthesis.cancel();
  if (!selectedVoice) loadVoices();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = selectedVoice || null;
  u.lang = 'en-GB';
  u.rate = 1.1;
  u.pitch = 1.0;
  isSpeaking = true;
  setMicState('speaking');
  u.onend = u.onerror = () => {
    isSpeaking = false;
    if (onDone) onDone();
    else { setMicState('idle'); setMicHint('Tryk for at tale'); }
  };
  speechSynthesis.speak(u);
}


// ── DATE ──
function setDate() {
  const d = new Date();
  const days = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  const months = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];
  document.getElementById('dateDisplay').innerHTML = `${days[d.getDay()]}<span>, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}</span>`;
}

// ── WEATHER ──
async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.68&longitude=12.57&current=temperature_2m,weathercode&timezone=Europe/Copenhagen');
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const descs = {0:'klart vejr',1:'let skyet',2:'skyet',3:'overskyet',45:'tåge',61:'let regn',63:'regn',71:'let sne',80:'byger'};
    const desc = descs[d.current.weathercode] || 'skiftende vejr';
    document.getElementById('weatherSub').textContent = `${temp}° · ${desc}`;
    return `${temp} grader, ${desc}`;
  } catch { return 'vejret ikke tilgængeligt'; }
}

// ── PROJECTS ──
async function loadProjects() {
  const { data, error } = await sb.from('projects').select('*');
  if (error) { console.log('Projects error:', error); return; }
  
  // Only seed if table is genuinely empty — never seed if there are already rows
  if (!data || data.length === 0) {
    console.log('No projects found — seeding defaults once');
    for (const name of ['WoodUpp','ByAulum','Timelog','Nye idéer']) {
      await sb.from('projects').insert({ name });
    }
    const { data: s } = await sb.from('projects').select('*');
    projects = s || [];
  } else {
    projects = data;
  }
  
  renderProjects(projects);
  document.getElementById('projectsSub').textContent = `${projects.length} aktive projekter`;
}

function renderProjects(list) {
  const el = document.getElementById('projectsList');
  el.innerHTML = '';
  list.forEach(p => {
    const d = document.createElement('div');
    d.className = 'project-item';
    d.innerHTML = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><div class="project-name">${p.name}</div><div class="project-arrow">›</div>`;
    d.onclick = () => openProject(p);
    el.appendChild(d);
  });
  const n = document.createElement('div');
  n.className = 'new-project';
  n.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Nyt projekt</span>`;
  n.onclick = () => document.getElementById('modal').classList.add('visible');
  el.appendChild(n);
}

async function openProject(p) {
  activeProject = p;
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('projectView').style.display = 'flex';
  document.getElementById('projectViewLabel').textContent = p.name.toUpperCase();
  
  // Load message history for this project
  const { data, error } = await sb.from('messages').select('*').eq('project_id', p.id);
  if (error) console.log('Messages error:', error);
  
  // Sort by created_at if available, otherwise use insertion order
  const sorted = (data || []).sort((a, b) => {
    if (a.created_at && b.created_at) return new Date(a.created_at) - new Date(b.created_at);
    return 0;
  });
  
  conversationHistory = sorted.map(m => ({ role: m.role, content: m.content }));
  console.log(`Loaded ${conversationHistory.length} messages for ${p.name}`);
  
  const chat = document.getElementById('chatArea');
  chat.innerHTML = '';
  
  if (conversationHistory.length === 0) {
    addBubble('assistant', `You are now in ${p.name}. What would you like to talk about?`);
  } else {
    // Show last 20 messages in UI
    const recent = conversationHistory.slice(-20);
    recent.forEach(m => addBubble(m.role, m.content, false));
    chat.scrollTop = chat.scrollHeight;
  }
  setMicHint(`Aktiv: ${p.name}`);
}

function goHome() {
  activeProject = null;
  conversationHistory = [];
  document.getElementById('projectView').style.display = 'none';
  document.getElementById('homeView').style.display = 'flex';
  setTranscript('Tryk på mikrofon for at tale');
  setMicHint('Altid lyttende');
}

async function createProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  console.log('Creating project:', name);
  const { data, error } = await sb.from('projects').insert({ name }).select();
  console.log('Create result:', data, error);
  closeModal();
  document.getElementById('newProjectName').value = '';
  await loadProjects();
  if (!error && data && data.length > 0) {
    openProject(data[0]);
    speak(`Project ${name} created. You are now in ${name}.`);
  } else if (error) {
    console.error('Project create error:', error);
    alert('Fejl ved oprettelse: ' + error.message);
  }
}

function closeModal() { document.getElementById('modal').classList.remove('visible'); }

// ── CHAT ──
function addBubble(role, text, scroll = true) {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = `bubble ${role}`;
  d.textContent = text;
  chat.appendChild(d);
  if (scroll) chat.scrollTop = chat.scrollHeight;
}

// ── CLAUDE ──
async function sendToClaude(text) {
  console.log('sendToClaude called, text:', text, 'activeProject:', activeProject ? activeProject.name : 'null');
  isThinking = true;
  setMicState('thinking');
  if (activeProject) {
    addBubble('user', text);
    conversationHistory.push({ role:'user', content:text });
    const { error: msgErr } = await sb.from('messages').insert({ project_id: activeProject.id, role:'user', content:text });
    if (msgErr) console.error('Save user message failed:', msgErr);
    else console.log('Saved user message to project:', activeProject.id);
  }

  const projectNames = projects.map(p => p.name).join(', ');

  const system = `You are Vox — Martin's personal AI assistant. Martin Høgsgaard is a Danish external consultant.
Current projects in the system: ${projectNames}.
${activeProject ? `Active project: "${activeProject.name}".` : 'No active project — Martin is on the home screen.'}

You can perform ACTIONS by including a JSON command at the very end of your reply, on its own line, like this:
ACTION:{"type":"create_project","name":"ProjectName"}
ACTION:{"type":"open_project","name":"ProjectName"}
ACTION:{"type":"go_home"}
ACTION:{"type":"delete_project","name":"ProjectName"}
ACTION:{"type":"connect_calendar"}
ACTION:{"type":"list_calendar"}
ACTION:{"type":"create_event","title":"Meeting","date":"2025-03-07","time":"14:00","duration":60}

Available actions:
- create_project: Create a new project with a given name
- open_project: Navigate to an existing project by name  
- delete_project: Delete a project by name
- go_home: Go back to home screen
- connect_calendar: Connect Google Calendar
- list_calendar: List today's calendar events
- create_event: Create a calendar event (include title, date as YYYY-MM-DD, time as HH:MM, duration in minutes)

Rules:
- Always reply in English. Keep replies to 1-2 sentences max — Martin is often driving.
- ONLY include an ACTION if Martin EXPLICITLY asks to: create a new project, open/go to a project, delete a project, or go home.
- NEVER include an ACTION for notes, questions, reminders, tasks, or any other request.
- If Martin asks a question or wants to save a note — just reply normally, NO action.
- Only include ONE action per reply, on the very last line.
- When in doubt — do NOT include an action.`;

  // Send last 10 messages to Claude (keeps context without exceeding token limits)
  const messages = conversationHistory.length > 0 
    ? conversationHistory.slice(-10) 
    : [{ role:'user', content:text }];

  try {
    const res = await fetch('/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:400, system, messages })
    });
    const data = await res.json();
    let reply = data.content[0].text;

    // Parse and execute any ACTION command
    const actionMatch = reply.match(/ACTION:(\{.*\})/);
    if (actionMatch) {
      reply = reply.replace(/\nACTION:\{[^}]*\}/, '').trim();
      try {
        const action = JSON.parse(actionMatch[1]);
        await executeAction(action);
      } catch(e) { console.log('Action parse error:', e); }
    }

    if (activeProject) {
      addBubble('assistant', reply);
      const { error: aErr } = await sb.from('messages').insert({ project_id: activeProject.id, role:'assistant', content:reply });
      if (aErr) console.error('Save assistant message failed:', aErr);
      else console.log('Saved assistant message to project:', activeProject.id);
      conversationHistory.push({ role:'assistant', content:reply });
    }
    isThinking = false;
    speak(reply, () => { setMicState('idle'); setMicHint('Tryk for at tale'); });
  } catch(e) {
    console.log('Claude error:', e);
    isThinking = false;
    speak('Sorry, something went wrong. Please try again.', () => { setMicState('idle'); setMicHint('Tryk for at tale'); });
  }
}

async function executeAction(action) {
  console.log('Executing action:', action);
  if (action.type === 'create_project') {
    const { data, error } = await sb.from('projects').insert({ name: action.name }).select();
    if (!error && data && data.length > 0) {
      await loadProjects();
      setTimeout(() => openProject(data[0]), 300);
    } else {
      console.log('Create project error:', error);
    }
  } else if (action.type === 'open_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) setTimeout(() => openProject(p), 300);
  } else if (action.type === 'delete_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) {
      // Delete all messages for this project first
      await sb.from('messages').delete().eq('project_id', p.id);
      await sb.from('projects').delete().eq('id', p.id);
      if (activeProject && activeProject.id === p.id) goHome();
      await loadProjects();
    }
  } else if (action.type === 'connect_calendar') {
    window.location.href = '/api/google-auth';
  } else if (action.type === 'list_calendar') {
    await listCalendarEvents();
  } else if (action.type === 'create_event') {
    await createCalendarEvent(action.title, action.date, action.time, action.duration);
  } else if (action.type === 'go_home') {
    goHome();
  }
}

async function listCalendarEvents() {
  try {
    const res = await fetch('/api/google-calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'list' })
    });
    const data = await res.json();
    const events = data.items || [];
    if (events.length === 0) { speak("You have no more events today."); return; }
    const summary = events.map(e => {
      const time = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}) : 'All day';
      return `${time}: ${e.summary}`;
    }).join('. ');
    speak(`Today you have ${events.length} events. ${summary}`);
  } catch(e) { speak('Could not load calendar events.'); }
}

async function createCalendarEvent(title, date, time, duration) {
  try {
    const start = new Date(`${date}T${time || '09:00'}:00`);
    const end = new Date(start.getTime() + (duration || 60) * 60000);
    const event = {
      summary: title,
      start: { dateTime: start.toISOString(), timeZone: 'Europe/Copenhagen' },
      end: { dateTime: end.toISOString(), timeZone: 'Europe/Copenhagen' }
    };
    const res = await fetch('/api/google-calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'create', event })
    });
    const data = await res.json();
    if (data.id) speak(`Done. ${title} has been added to your calendar.`);
    else speak('Could not create the event. Please try again.');
  } catch(e) { speak('Could not create calendar event.'); }
}

// ── VOICE COMMANDS ──
function handleCommand(text) {
  const t = text.toLowerCase();
  setTranscript(text);

  if (t.includes('morgenoverblik') || t.includes('morning brief') || t.includes('godmorgen')) { playMorningBrief(); return; }
  if ((t.includes('gå hjem') || t.includes('tilbage') || t.includes('hjem')) && activeProject) { goHome(); speak('Going home.'); return; }

  // If already in a project, don't navigate — send to Claude instead
  if (activeProject) {
    sendToClaude(text);
    return;
  }

  // From home screen: check if user said a project name to navigate
  for (const p of projects) {
    if (t.includes(p.name.toLowerCase())) {
      openProject(p);
      speak(`Opening ${p.name}.`, () => { setMicState('idle'); setTimeout(startListening, 600); });
      return;
    }
  }

  // No project match — send to Claude from home
  sendToClaude(text);
}

// ── PUSH TO TALK ──
function startListening() {
  if (isListening || isThinking) return;
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setMicHint('Stemme ikke understøttet — brug Safari');
    return;
  }

  // Stop speaking if active
  if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'da-DK';
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    // Stop speaking immediately when user starts talking
    if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; }
    setMicState('listening');
    setMicHint('Tryk igen for at sende');
    setTranscript('');
  };

  let finalTranscript = '';
  recognition.onresult = e => {
    finalTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else finalTranscript += e.results[i][0].transcript;
    }
    setTranscript(finalTranscript.trim());
  };

  recognition.onend = () => {
    isListening = false;
    const transcript = finalTranscript.trim();
    finalTranscript = '';
    if (transcript && transcript.length > 1) {
      handleCommand(transcript);
    } else {
      setMicState('idle');
      setMicHint('Tryk for at tale');
    }
  };

  recognition.onerror = e => {
    isListening = false;
    finalTranscript = '';
    setMicState('idle');
    if (e.error === 'not-allowed') {
      setMicHint('Mikrofon ikke tilladt — tjek indstillinger');
    } else {
      setMicHint('Tryk for at tale');
    }
  };

  recognition.continuous = true;
  try { recognition.start(); } catch(e) { console.log('Recognition error:', e); }
}

function stopListening() {
  if (recognition && isListening) {
    try { recognition.stop(); } catch {}
  }
}

function handleMicTap() {
  if (isThinking) return;
  if (isListening) { stopListening(); return; } // Tap again to send
  if (isSpeaking) { speechSynthesis.cancel(); isSpeaking = false; setMicState('idle'); setMicHint('Tryk for at tale'); return; }
  startListening();
}

// Stop mic when page loses focus
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopListening();
    speechSynthesis.cancel();
    isSpeaking = false;
    isListening = false;
    setMicState('idle');
  }
});

// ── UI ──
function setMicState(state) {
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  btn.className = 'mic-outer';
  if (state === 'listening') { btn.classList.add('listening'); status.textContent = 'Lytter'; }
  else if (state === 'thinking') { btn.classList.add('thinking'); status.textContent = 'Tænker'; }
  else if (state === 'speaking') { btn.classList.add('speaking'); status.textContent = 'Svarer'; }
  else { btn.classList.add('idle'); status.textContent = 'Lytter'; }
}
function setTranscript(t) { document.getElementById('transcriptBox').textContent = t; }
function setMicHint(t) { document.getElementById('micHint').textContent = t; }

// ── MORNING BRIEF ──
async function playMorningBrief() {
  if (recognition) try { recognition.stop(); } catch {}
  isListening = false;
  const weather = await fetchWeather();
  const d = new Date();
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  const pNames = projects.map(p => p.name).join(', ');
  const brief = `Good morning Martin. Today is ${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]}. Weather in Denmark: ${weather}. You have ${projects.length} active projects: ${pNames}. What would you like to start with today?`;
  speak(brief);
}

// ── INIT ──
async function init() {
  setDate();
  fetchWeather();
  await loadProjects();
  setMicState('idle');
  setMicHint('Tryk for at tale');

  // Check if returning from Google OAuth
  const params = new URLSearchParams(window.location.search);
  if (params.get('calendar') === 'connected') {
    calendarConnected = true;
    window.history.replaceState({}, '', '/');
    speak('Google Calendar is now connected.');
  } else if (params.get('calendar') === 'error') {
    window.history.replaceState({}, '', '/');
    speak('Could not connect Google Calendar. Please try again.');
  }
}
init();
