<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vox">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Vox</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#f2f2f7; --card:#fff; --border:#e5e5ea; --label:#8e8e93; --text:#1c1c1e; --r:12px; --rs:8px; }
html,body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); max-width:390px; margin:0 auto; display:flex; flex-direction:column; height:100dvh; }

.header { padding:52px 20px 12px; flex-shrink:0; }
.date-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:2px; }
.date-main { font-size:22px; font-weight:600; letter-spacing:-.3px; }
.date-main span { font-weight:300; color:var(--label); }
.divider { height:1px; background:var(--border); margin:0 20px; flex-shrink:0; }

.content { flex:1; overflow-y:auto; padding:14px 20px 0; display:flex; flex-direction:column; gap:14px; }
.section-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:8px; }

.brief-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.brief-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); }
.brief-item:last-child { border-bottom:none; }
.brief-item svg { width:16px; height:16px; stroke:var(--text); fill:none; stroke-width:1.6; flex-shrink:0; }
.brief-title { flex:1; font-size:14px; font-weight:500; }
.brief-sub { font-size:12px; color:var(--label); }
.play-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; width:100%; cursor:pointer; margin-top:8px; }
.play-btn svg { width:14px; height:14px; fill:white; }

.projects-card { background:var(--card); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
.project-item { display:flex; align-items:center; padding:10px 14px; gap:10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
.project-item:last-child { border-bottom:none; }
.project-item svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; flex-shrink:0; }
.project-name { flex:1; font-size:14px; font-weight:500; }
.project-arrow { font-size:16px; color:var(--label); }
.new-project { display:flex; align-items:center; padding:10px 14px; gap:10px; cursor:pointer; border-top:1px solid var(--border); }
.new-project svg { width:14px; height:14px; stroke:var(--label); fill:none; stroke-width:1.6; }
.new-project span { font-size:14px; color:var(--label); }

.chat-area { display:flex; flex-direction:column; gap:8px; }
.bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; max-width:85%; }
.bubble.user { background:var(--text); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.bubble.assistant { background:var(--card); color:var(--text); align-self:flex-start; border:1px solid var(--border); border-bottom-left-radius:4px; }
.back-btn { font-size:13px; color:var(--label); cursor:pointer; padding:4px 0; margin-bottom:8px; }

.transcript-box { background:var(--card); border:1px solid var(--border); border-radius:var(--rs); padding:8px 14px; font-size:13px; color:var(--label); font-style:italic; margin:8px 20px; text-align:center; min-height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

.home-chat-wrap { flex:1; overflow-y:auto; padding:0 20px 8px; display:flex; flex-direction:column; gap:8px; }
.home-chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--label); font-size:13px; padding-bottom:20px; }
.home-chat-empty svg { width:32px; height:32px; stroke:var(--border); fill:none; stroke-width:1.5; }

.confirm-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; margin:0 20px 8px; flex-shrink:0; }
.confirm-card-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:6px; }
.confirm-card-value { font-size:15px; font-weight:500; margin-bottom:12px; word-break:break-all; }
.confirm-card-btns { display:flex; gap:8px; }
.confirm-yes { flex:1; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; }
.confirm-no { flex:1; background:none; color:var(--label); border:1px solid var(--border); border-radius:var(--rs); padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; }
.email-choice-list { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.email-choice-btn { background:var(--bg); border:1px solid var(--border); border-radius:var(--rs); padding:10px 14px; text-align:left; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .15s; }
.email-choice-btn:active { background:var(--border); }
.email-choice-name { font-size:12px; color:var(--label); margin-bottom:2px; }
.email-choice-addr { font-size:14px; font-weight:500; word-break:break-all; }
.email-choice-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px; margin-top:4px; cursor:pointer; }
.email-preview-field { margin-bottom:10px; }
.email-preview-field-label { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:4px; }
.email-preview-field-value { font-size:13px; color:var(--text); word-break:break-all; }
.email-preview-body { width:100%; border:1px solid var(--border); border-radius:var(--rs); padding:10px 12px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); background:var(--bg); resize:vertical; min-height:80px; margin-top:4px; outline:none; }
.email-preview-send { width:100%; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:12px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; margin-top:8px; }
.email-preview-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px; cursor:pointer; }

.mic-section { display:flex; flex-direction:column; align-items:center; padding:6px 0 8px; flex-shrink:0; }
.mic-status { font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--label); text-transform:uppercase; margin-bottom:10px; }
.mic-outer { width:76px; height:76px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .25s; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.mic-outer svg { width:30px; height:30px; stroke:var(--text); fill:none; stroke-width:1.5; transition:stroke .25s; }
.mic-outer.idle { animation:idlePulse 3s infinite ease-in-out; }
@keyframes idlePulse { 0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.06)} 50%{box-shadow:0 2px 18px rgba(0,0,0,.13)} }
.mic-outer.listening { background:var(--text); border-color:var(--text); animation:listenPulse 1.2s infinite; }
.mic-outer.listening svg { stroke:#fff; }
@keyframes listenPulse { 0%,100%{box-shadow:0 0 0 10px rgba(28,28,30,.09),0 0 0 20px rgba(28,28,30,.04)} 50%{box-shadow:0 0 0 16px rgba(28,28,30,.06),0 0 0 30px rgba(28,28,30,.02)} }
.mic-outer.thinking svg { stroke:var(--label); }
.mic-outer.speaking { animation:speakPulse .9s infinite ease-in-out; }
@keyframes speakPulse { 0%,100%{box-shadow:0 0 0 6px rgba(28,28,30,.05)} 50%{box-shadow:0 0 0 14px rgba(28,28,30,.03)} }
.mic-hint { font-size:11px; color:var(--label); margin-top:8px; text-align:center; min-height:16px; }

.bottom-nav { background:rgba(242,242,247,.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding:8px 0 24px; flex-shrink:0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; cursor:pointer; }
.nav-item svg { width:22px; height:22px; stroke:var(--label); fill:none; stroke-width:1.5; }
.nav-item.active svg { stroke:var(--text); }
.nav-label { font-size:9px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; color:var(--label); }
.nav-item.active .nav-label { color:var(--text); }

.cal-day-group { margin-bottom:14px; }
.cal-day-header { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--label); margin-bottom:6px; padding:0 2px; }
.cal-day-header.today { color:var(--text); }
.cal-event { background:var(--card); border-radius:var(--rs); border:1px solid var(--border); padding:11px 14px; margin-bottom:6px; display:flex; gap:12px; align-items:center; cursor:pointer; transition:background .15s; }
.cal-event:active { background:var(--bg); }
.cal-event-time { font-size:12px; font-weight:600; color:var(--label); min-width:40px; text-align:right; line-height:1.3; }
.cal-event-time.allday { font-size:10px; text-transform:uppercase; letter-spacing:.04em; }
.cal-event-dot { width:8px; height:8px; border-radius:50%; background:var(--text); flex-shrink:0; }
.cal-event-dot.today { background:#007aff; }
.cal-event-info { flex:1; min-width:0; }
.cal-event-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-event-duration { font-size:12px; color:var(--label); margin-top:1px; }
.cal-empty { padding:20px 14px; font-size:13px; color:var(--label); text-align:center; }
.cal-add-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:11px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; width:100%; cursor:pointer; margin-bottom:14px; }
.cal-add-btn svg { width:14px; height:14px; stroke:#fff; fill:none; stroke-width:2; }
.cal-loading { padding:30px; text-align:center; font-size:13px; color:var(--label); }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px 40px; width:100%; max-width:390px; }
.modal-title { font-size:17px; font-weight:600; margin-bottom:16px; }
.modal-input { width:100%; border:1px solid var(--border); border-radius:var(--rs); padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:15px; outline:none; background:var(--bg); }
.modal-btn { width:100%; background:var(--text); color:#fff; border:none; border-radius:var(--rs); padding:13px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; margin-top:12px; cursor:pointer; }
.modal-cancel { width:100%; background:none; border:none; color:var(--label); font-family:'DM Sans',sans-serif; font-size:15px; margin-top:8px; cursor:pointer; padding:8px; }
</style>
</head>
<body>

<div class="header">
  <div class="date-label">I DAG</div>
  <div class="date-main" id="dateDisplay">Indlæser...</div>
</div>
<div class="divider"></div>

<!-- SPLASH -->
<div id="splashScreen" style="position:fixed;inset:0;background:#1c1c1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:24px;">
  <div style="font-size:42px;font-weight:700;color:#fff;letter-spacing:-1px;">Vox</div>
  <div style="font-size:14px;color:rgba(255,255,255,.5);letter-spacing:.05em;text-transform:uppercase;">Din personlige assistent</div>
  <div style="margin-top:16px;background:#fff;color:#1c1c1e;border:none;border-radius:50px;padding:16px 40px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:-.2px;" onclick="startApp()">Tryk for at starte</div>
</div>

<!-- HOME -->
<div class="content" id="homeView" style="display:flex;flex-direction:column;padding:0;gap:0;">
  <div class="home-chat-wrap" id="homeChatWrap">
    <div class="home-chat-empty" id="homeChatEmpty">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Tryk på mikrofon og tal til Vox
    </div>
    <div class="chat-area" id="homeChatArea"></div>
  </div>
  <div class="confirm-card" id="confirmCard" style="display:none;">
    <div class="confirm-card-label" id="confirmLabel">Vælg adresse</div>
    <div id="confirmCardBody"></div>
  </div>
</div>

<!-- PROJECT VIEW -->
<div class="content" id="projectView" style="display:none;">
  <div>
    <div class="back-btn" onclick="goHome()">‹ Hjem</div>
    <div class="section-label" id="projectViewLabel">Samtale</div>
    <div class="chat-area" id="chatArea"></div>
  </div>
</div>

<!-- CALENDAR VIEW -->
<div class="content" id="calendarView" style="display:none;">
  <div>
    <button class="cal-add-btn" onclick="startVoiceCreate()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

    </button>
    <div id="calendarList"><div class="cal-loading">Henter kalender...</div></div>

</div>

<!-- PROJEKTER VIEW -->
<div class="content" id="projekterView" style="display:none;">
  <div>
    <div class="projects-card" id="projekterList"><div style="padding:14px;font-size:13px;color:var(--label)">Henter...</div></div>
    <div class="new-project" onclick="openModal()" style="background:var(--card);border-radius:var(--rs);border:1px solid var(--border);margin-top:8px;">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Nyt projekt</span>
    </div>
  </div>
</div>

<!-- TRANSCRIPT -->
<div class="transcript-box" id="transcriptBox">Tryk på mikrofon for at tale</div>

<!-- MIC -->
<div class="mic-section">
  <div class="mic-status" id="micStatus">Lytter</div>
  <div class="mic-outer idle" id="micBtn" onclick="handleMicTap()">
    <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>
  </div>
  <div class="mic-hint" id="micHint">Altid lyttende</div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item" id="nav-hjem" onclick="navTo('hjem')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span class="nav-label">Hjem</span>
  </div>
  <div class="nav-item" id="nav-projekter" onclick="navTo('projekter')">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    <span class="nav-label">Projekter</span>
  </div>
  <div class="nav-item" id="nav-kalender" onclick="navTo('kalender')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-label">Kalender</span>
  </div>
  <div class="nav-item" id="nav-konto" onclick="navTo('konto')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Konto</span>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Nyt projekt</div>
    <input class="modal-input" id="newProjectName" placeholder="Projektnavn..."/>
    <button class="modal-btn" onclick="createProject()">Opret</button>
    <button class="modal-cancel" onclick="closeModal()">Annuller</button>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const TTS_ENGINE = 'browser'; // 'browser' | 'openai' | 'elevenlabs'
const TTS_VOICE  = 'onyx';
const TTS_ELEVENLABS_VOICE_ID = 'pNInz6obpgDQGcFmaJgB';
const STT_ENGINE = 'whisper'; // 'browser' | 'whisper'

// ═══════════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://kahpdsismxckxljddxya.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthaHBkc2lzbXhja3hsamRkeHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzE1OTMsImV4cCI6MjA4ODQwNzU5M30.KzFNs2rhbatc4u8Ec1ZcfDVKykZnkLfV2K_cvSakSxc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════════════
// DEVICE DETECTION
// ═══════════════════════════════════════════════════════
const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let activeProject = null;
let conversationHistory = [];
let homeHistory = [];
let projectMemory = '';
let userProfile = {};
let projects = [];
let isListening = false;
let isSpeaking = false;
let driveContext = '';
let driveFiles = [];
let isThinking = false;
let recognition = null;
let calendarConnected = false;

function saveToHistory(role, content) {
  if (activeProject) {
    if (role === 'assistant') conversationHistory.push({ role, content });
  } else {
    homeHistory.push({ role, content });
    if (homeHistory.length > 12) homeHistory = homeHistory.slice(-12);
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════════════
// TTS — VOICE SELECTION
// Optimeret til Chrome Mac + Safari iPhone
// ═══════════════════════════════════════════════════════
let selectedVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  console.log('[TTS] Available voices:', voices.map(v => v.name + ' (' + v.lang + ')').join(', '));

  // Chrome Mac — Google-stemmer først
  const chromePriority = [
    'Google UK English Male',
    'Google UK English Female',
    'Google US English',
    'Google US English 1 (Natural)',
    'Google US English 2 (Natural)',
  ];

  // Safari iOS/Mac — Enhanced er bedst
  const safariPriority = [
    'Daniel (Enhanced)', 'Arthur (Enhanced)', 'Oliver (Enhanced)',
    'Rishi (Enhanced)', 'Aaron (Enhanced)',
    'Daniel', 'Arthur', 'Oliver', 'Rishi', 'Aaron',
    'Karen', 'Alex', 'Samantha',
  ];

  const priority = isChrome
    ? [...chromePriority, ...safariPriority]
    : [...safariPriority, ...chromePriority];

  for (const name of priority) {
    const v = voices.find(v => v.name === name);
    if (v) { selectedVoice = v; console.log('[TTS] Voice selected:', v.name, v.lang); return; }
  }

  // Fallback: aldrig dansk
  const enGB = voices.find(v => v.lang === 'en-GB' && !v.name.toLowerCase().includes('dansk') && !v.name.toLowerCase().includes('danish'));
  if (enGB) { selectedVoice = enGB; console.log('[TTS] en-GB fallback:', enGB.name); return; }

  const enUS = voices.find(v => v.lang === 'en-US');
  if (enUS) { selectedVoice = enUS; console.log('[TTS] en-US fallback:', enUS.name); return; }

  const anyEn = voices.find(v => v.lang.startsWith('en'));
  if (anyEn) { selectedVoice = anyEn; console.log('[TTS] any-en fallback:', anyEn.name); return; }

  selectedVoice = voices[0];
  console.warn('[TTS] Last resort fallback:', selectedVoice?.name);
}

speechSynthesis.onvoiceschanged = loadVoices;
[100, 300, 600, 1000, 2000, 3000].forEach(t => setTimeout(loadVoices, t));

// ═══════════════════════════════════════════════════════
// TTS — SPEAK
// ═══════════════════════════════════════════════════════
let _speakQueue = [];
let _speakBusy = false;
let _stopRequested = false;
let _currentAudio = null;

function stopSpeaking() {
  _stopRequested = true;
  _speakQueue = [];
  _speakBusy = false;
  isSpeaking = false;
  try { speechSynthesis.cancel(); } catch {}
  if (_currentAudio) {
    try { _currentAudio.pause(); _currentAudio.src = ''; } catch {}
    _currentAudio = null;
  }
  setMicState('idle');
  setMicHint('Tryk for at tale');
}

function speak(text, onDone) {
  if (!text) { if (onDone) onDone(); return; }
  _stopRequested = false;
  stopSpeaking();
  _stopRequested = false;
  _speakQueue = [{ text, onDone }];
  setTimeout(_processQueue, 50);
}

function speakQueued(text, onDone) {
  _speakQueue.push({ text, onDone });
  _processQueue();
}

function _processQueue() {
  if (_stopRequested || _speakBusy || _speakQueue.length === 0) return;
  const { text, onDone } = _speakQueue.shift();
  _speakBusy = true;
  isSpeaking = true;
  setMicState('speaking');
  if (TTS_ENGINE === 'openai') _speakOpenAI(text, onDone);
  else if (TTS_ENGINE === 'elevenlabs') _speakElevenLabs(text, onDone);
  else _speakBrowser(text, onDone);
}

function _speakBrowser(text, onDone) {
  if (!selectedVoice) loadVoices();
  const safe = text.replace(/ dot /gi, ' DOT ');
  const sentences = safe.match(/[^.!?]+[.!?]*/g) || [safe];
  let idx = 0;

  function next() {
    if (_stopRequested) { _speakBusy = false; return; }
    if (idx >= sentences.length) {
      _speakBusy = false;
      isSpeaking = _speakQueue.length > 0;
      if (onDone && !_stopRequested) onDone();
      else if (_speakQueue.length === 0) { setMicState('idle'); setMicHint('Tryk for at tale'); }
      _processQueue();
      return;
    }
    const chunk = sentences[idx].trim().replace(/ DOT /g, ' dot ');
    if (!chunk) { idx++; next(); return; }
    const u = new SpeechSynthesisUtterance(chunk);
    u.voice = selectedVoice || null;
    u.lang = 'en-GB';
    u.rate = isIOS ? 1.0 : 1.1;
    u.pitch = 1.0;
    u.volume = 1.0;
    u.onend = () => { idx++; next(); };
    u.onerror = (e) => {
      if (e.error === 'interrupted' || e.error === 'canceled') { _speakBusy = false; isSpeaking = false; return; }
      console.warn('[TTS] Browser error:', e.error, chunk);
      idx++; next();
    };
    speechSynthesis.speak(u);
  }
  next();
}

async function _speakOpenAI(text, onDone) {
  try {
    const res = await fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ engine:'openai', text, voice: TTS_VOICE }) });
    if (!res.ok) throw new Error('TTS API error');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    _currentAudio = new Audio(url);
    _currentAudio.onended = () => { URL.revokeObjectURL(url); _currentAudio=null; _speakBusy=false; isSpeaking=_speakQueue.length>0; if(onDone&&!_stopRequested) onDone(); else if(!_speakQueue.length){ setMicState('idle'); setMicHint('Tryk for at tale'); } _processQueue(); };
    _currentAudio.onerror = () => { _currentAudio=null; _speakBrowser(text, onDone); };
    await _currentAudio.play();
  } catch(e) { console.warn('[TTS] OpenAI failed:', e.message); _speakBrowser(text, onDone); }
}

    _currentAudio.onerror = () => { _currentAudio=null; _speakBrowser(text, onDone); };
    await _currentAudio.play();

let _wakeLock = null;
let _heartbeatInterval = null;
let _heartbeatCtx = null;

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { console.log('[WakeLock] Released — reacquiring'); setTimeout(acquireWakeLock, 500); });
    console.log('[WakeLock] Acquired');
  } catch(e) { console.log('[WakeLock] Not available:', e.message); }
}

function startAudioHeartbeat() {
  if (_heartbeatInterval) return;
  try {
    _heartbeatCtx = new (window.AudioContext || window.webkitAudioContext)();
    _heartbeatInterval = setInterval(() => {
      if (isSpeaking || isListening) return;
      try {
        const buf = _heartbeatCtx.createBuffer(1, 1, 22050);
        const src = _heartbeatCtx.createBufferSource();
        const gain = _heartbeatCtx.createGain();
        gain.gain.value = 0.001;
        src.buffer = buf; src.connect(gain); gain.connect(_heartbeatCtx.destination); src.start(0);
      } catch {}
    }, 20000);
    console.log('[Heartbeat] Started');
  } catch(e) { console.log('[Heartbeat] AudioContext not available:', e.message); }
}

document.addEventListener('visibilitychange', async () => {
  if (document.hidden) {
    if (isListening) { stopListening(); setMicState('idle'); setMicHint('Tryk for at tale'); }
    stopSpeaking();
  } else {
    await acquireWakeLock();
    if (_heartbeatCtx && _heartbeatCtx.state === 'suspended') {
      try { await _heartbeatCtx.resume(); console.log('[Heartbeat] Resumed'); } catch {}
    }
    setMicState('idle'); setMicHint('Tryk for at tale');
  }
});

document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && _wakeLock === null) await acquireWakeLock();
});

window.addEventListener('blur', () => { if (isListening) { stopListening(); setMicState('idle'); } });
window.addEventListener('pagehide', () => { stopListening(); stopSpeaking(); if (_heartbeatInterval) { clearInterval(_heartbeatInterval); _heartbeatInterval = null; } });

// ═══════════════════════════════════════════════════════
// STT — BROWSER WEB SPEECH
// ═══════════════════════════════════════════════════════
let micTranscript = '';

function startListening() {
  if (isThinking) return;
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setMicHint('Stemme ikke understøttet — brug Safari'); return;
  }
  if (isSpeaking || _speakBusy) stopSpeaking();
  isListening = true;
  micTranscript = '';
  setMicState('listening');
  setMicHint('Tryk igen for at sende');
  setTranscript('');
  _startRecognitionInstance();
}

function _startRecognitionInstance() {
  if (!isListening) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'da-DK';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    let interim = micTranscript;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) micTranscript += e.results[i][0].transcript + ' ';
      else interim = micTranscript + e.results[i][0].transcript;
    }
    const t = interim.trim();
    setTranscript(t);
    setLiveTranscript(t);
  };

  recognition.onend = () => { recognition = null; if (isListening) setTimeout(_startRecognitionInstance, 100); };
  recognition.onerror = (e) => {
    recognition = null;
    if (e.error === 'not-allowed') { isListening = false; setMicState('idle'); setMicHint('Mikrofon ikke tilladt — tjek indstillinger'); return; }
    if (e.error === 'no-speech') { if (isListening) setTimeout(_startRecognitionInstance, 200); return; }
    console.warn('[STT] Error:', e.error);
    if (isListening) setTimeout(_startRecognitionInstance, 300);
  };
  try { recognition.start(); } catch(e) { if (isListening) setTimeout(_startRecognitionInstance, 300); }
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
  const transcript = micTranscript.trim();
  micTranscript = '';
  setLiveTranscript('');
  return transcript;
}

// ═══════════════════════════════════════════════════════
// STT — WHISPER (med korrekt MIME for Safari + Chrome)
// ═══════════════════════════════════════════════════════
let _mediaRecorder = null;
let _audioChunks = [];

function startListeningWhisper() {
  if (isThinking) return;
  if (isSpeaking || _speakBusy) stopSpeaking();
  isListening = true;
  setMicState('listening');
  setMicHint('Tryk igen for at sende');
  _audioChunks = [];

  // Live feedback mens der optages
  setTranscript('🎙 Optager...');

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      // Vælg bedste MIME for platformen:
      // Chrome: audio/webm;codecs=opus (bedst) eller audio/webm
      // Safari iOS: audio/mp4 (eneste mulighed)
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : MediaRecorder.isTypeSupported('audio/mp4')
            ? 'audio/mp4'
            : '';

      const opts = mimeType ? { mimeType } : {};
      _mediaRecorder = new MediaRecorder(stream, opts);
      _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
      _mediaRecorder.start(250);
      console.log('[Whisper] Recording MIME:', _mediaRecorder.mimeType);
    })
    .catch(e => {
      console.warn('[Whisper STT] Mic error:', e);
      isListening = false;
      setMicState('idle');
      setMicHint('Mikrofon ikke tilladt — tjek indstillinger');
      setTranscript('Tryk på mikrofon for at tale');
    });
}

async function stopListeningWhisper() {
  isListening = false;
  if (!_mediaRecorder) return '';

  return new Promise(resolve => {
    _mediaRecorder.onstop = async () => {
      const stream   = _mediaRecorder.stream;
      const mimeType = _mediaRecorder.mimeType;
      stream.getTracks().forEach(t => t.stop());
      _mediaRecorder = null;

      const blob = new Blob(_audioChunks, { type: mimeType });
      _audioChunks = [];

      // Filnavn matcher MIME
      const filename = mimeType.includes('mp4') ? 'audio.mp4' : 'audio.webm';

      setTranscript('⏳ Transskriberer...');
      setMicHint('Transskriberer...');

      try {
        const form = new FormData();
        form.append('audio', blob, filename);
        form.append('prompt', 'Martin, Mie, WoodUpp, ByAulum, Timelog, Høgsgaard, weproduce');
        form.append('language', 'da');
        const res = await fetch('/api/stt', { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          console.error('[Whisper STT] Server error:', res.status, err);
          setTranscript('Tryk på mikrofon for at tale');
          resolve('');
          return;
        }
        const data = await res.json();
        const text = data.text?.trim() || '';
        setTranscript(text || 'Ingen tekst — prøv igen');
        resolve(text);
      } catch(e) {
        console.warn('[Whisper STT] Error:', e);
        setTranscript('Tryk på mikrofon for at tale');
        resolve('');
      }
    };
    _mediaRecorder.stop();
  });
}

// ═══════════════════════════════════════════════════════
// MIC TAP HANDLER
// ═══════════════════════════════════════════════════════
function handleMicTap() {
  const card = document.getElementById('confirmCard');
  if (card && card.style.display !== 'none') {
    if (isSpeaking || _speakBusy) { stopSpeaking(); return; }
    return;
  }
  if (isSpeaking || _speakBusy || _speakQueue.length > 0) { stopSpeaking(); return; }
  if (isThinking) return;

  if (STT_ENGINE === 'whisper') {
    if (isListening) {
      stopListeningWhisper().then(transcript => {
        if (transcript && transcript.length > 1) handleCommand(transcript);
        else { setMicState('idle'); setMicHint('Tryk for at tale'); }
      });
    } else {
      startListeningWhisper();
    }
  } else {
    if (isListening) {
      const transcript = stopListening();
      if (transcript && transcript.length > 1) handleCommand(transcript);
      else { setMicState('idle'); setMicHint('Tryk for at tale'); }
    } else {
      startListening();
    }
  }
}

async function renderCalendarView() {
  const list = document.getElementById('calendarList');
  list.innerHTML = '<div class="cal-loading">Henter kalender...</div>';
  try {
    const res = await fetch('/api/google-calendar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'upcoming_14' }) });
    const data = await res.json();
    const events = data.items || [];
    if (events.length === 0) { list.innerHTML = '<div class="cal-empty">Ingen kommende aftaler</div>'; return; }
    const groups = {};
    events.forEach(e => { const dk = (e.start.dateTime || e.start.date).split('T')[0]; if (!groups[dk]) groups[dk] = []; groups[dk].push(e); });
    const todayStr = new Date().toISOString().split('T')[0];
    const tomorrowStr = (() => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; })();
    let html = '';
    Object.keys(groups).sort().forEach(dateKey => {
      const isToday = dateKey === todayStr, isTomorrow = dateKey === tomorrowStr;
      const d = new Date(dateKey + 'T12:00:00');
      let label = isToday ? 'I dag' : isTomorrow ? 'I morgen' : d.toLocaleDateString('da', { weekday:'long', day:'numeric', month:'long' });
      label = label.charAt(0).toUpperCase() + label.slice(1);
      html += `<div class="cal-day-group"><div class="cal-day-header${isToday?' today':''}">${label}</div>`;
      groups[dateKey].forEach(e => {
        const isAllDay = !!e.start.date;
        let timeStr = '', durationStr = '';
        if (!isAllDay) {
          const start = new Date(e.start.dateTime), end = new Date(e.end.dateTime);
          timeStr = start.toLocaleTimeString('da', { hour:'2-digit', minute:'2-digit' });
          const mins = Math.round((end - start) / 60000);
          durationStr = mins >= 60 ? `${Math.floor(mins/60)}t${mins%60 ? ' '+mins%60+'m' : ''}` : `${mins}m`;
        } else { timeStr = 'Hele<br>dagen'; }
        html += `<div class="cal-event" onclick="speakEvent('${esc(e.summary)}','${timeStr.replace('<br>',' ')}')"><div class="cal-event-time${isAllDay?' allday':''}">${timeStr}</div><div class="cal-event-dot${isToday?' today':''}"></div><div class="cal-event-info"><div class="cal-event-title">${esc(e.summary)}</div>${durationStr?`<div class="cal-event-duration">${durationStr}</div>`:''}</div></div>`;
      });
      html += '</div>';
    });
    list.innerHTML = html;
  } catch { list.innerHTML = '<div class="cal-empty">Kunne ikke hente kalender</div>'; }
}

function addBubble(role, text, scroll = true) {

}

let _liveBubble = null;
function setLiveTranscript(text) {
  if (activeProject) { setTranscript(text); return; }

// ═══════════════════════════════════════════════════════
const STOP_WORDS = ['stop', 'hold op', 'nok', 'stilhed', 'quiet', 'shut up', 'enough', 'lad være'];
function isStopCommand(text) {
  const t = text.toLowerCase().trim();
  return STOP_WORDS.some(w => t === w || t.startsWith(w + ' ') || t.endsWith(' ' + w));
}

async function sendToClaude(text) {
  if (isStopCommand(text)) { stopSpeaking(); speak('Ok.'); return; }

  isThinking = true;
  setMicState('thinking');
  setMicHint('Arbejder...');
  setLiveTranscript('');

  if (activeProject) {
    addBubble('user', text);
    conversationHistory.push({ role:'user', content:text });

  } else {
    addBubble('user', text);
    homeHistory.push({ role:'user', content:text });
    if (homeHistory.length > 12) homeHistory = homeHistory.slice(-12);
  }

  const projectNames = projects.map(p => p.name).join(', ');
  const now = new Date();
  const copenhagenDate = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Europe/Copenhagen' }).format(now);
  const copenhagenWeekday = new Intl.DateTimeFormat('en-US', { timeZone: 'Europe/Copenhagen', weekday: 'long' }).format(now);

  function getISOWeek(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const next60 = Array.from({length: 60}, (_, i) => {
    const d = new Date(now); d.setDate(d.getDate() + i);
    const dateStr = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Europe/Copenhagen' }).format(d);
    return `W${getISOWeek(d)} ${dayNames[d.getDay()]} = ${dateStr}`;
  });
  const tomorrowDate = new Date(now); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
  const tomorrowStr = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Europe/Copenhagen' }).format(tomorrowDate);

  const CAL_KEYWORDS = ['møde','kalender','aftale','event','begivenhed','tid','tidspunkt','opret','slet','flyt','hvad sker','har jeg','schedule','calendar','meeting','appointment','create event','delete event','update event','mandag','tirsdag','onsdag','torsdag','fredag','lørdag','søndag','i dag','imorgen','næste uge','denne uge'];
  const needsCalendar = CAL_KEYWORDS.some(k => text.toLowerCase().includes(k));
  let calendarContext = '';
  if (needsCalendar) {
    try {
      const calRes = await fetch('/api/google-calendar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'upcoming_14' }) });
      const calData = await calRes.json();
      const calEvents = calData.items || [];
      calendarContext = calEvents.length > 0
        ? '\n\nCALENDAR (next 14 days):\n' + calEvents.map(e => `- id:${e.id} | "${e.summary}" | start:${e.start.dateTime || e.start.date} | end:${e.end.dateTime || e.end.date}`).join('\n')
        : '\n\nCALENDAR: No upcoming events.';
    } catch {}
  }

  const confirmedEmailContext = window._confirmedEmail
    ? `\n\nIMPORTANT: Martin has already confirmed the email address "${window._confirmedEmail}". Use send_confirmed_email with this address.`
    : '';

  const system = `You are Vox — Martin Høgsgaard's personal AI assistant. Martin is a Danish external consultant working with clients on packaging, logistics, and software projects.
Current projects: ${projectNames}.
Today: ${copenhagenDate} (${copenhagenWeekday}). Tomorrow: ${tomorrowStr}.
ALWAYS use Europe/Copenhagen timezone.
DATE REFERENCE: ${next60.join(', ')}
${activeProject ? `Active project: "${activeProject.name}".${projectMemory ? `\n\nPREVIOUS SUMMARY:\n${projectMemory}` : ''}` : 'No active project.'}${calendarContext}
${driveFiles.length > 0 ? `\nPROJECT FILES: ${driveFiles.map(f=>f.name).join(', ')}${driveContext ? '\nFILE CONTENTS:\n' + driveContext : ''}` : ''}
${Object.keys(userProfile).length > 0 ? `USER PROFILE:\n${Object.entries(userProfile).map(([k,v])=>`${k}: ${v}`).join('\n')}\n` : ''}CRITICAL LANGUAGE RULE: You MUST reply in English. ALWAYS. Every single word. No exceptions. Martin speaks Danish to you — that is fine and expected. But your replies must be in English. Martin is frequently driving so replies are read aloud. Be conversational and concise.

ACTIONS — append ONE on the last line when needed:
ACTION:{"type":"create_project","name":"ProjectName"}
ACTION:{"type":"open_project","name":"ProjectName"}
ACTION:{"type":"delete_project","name":"ProjectName"}
ACTION:{"type":"go_home"}
ACTION:{"type":"open_drive_folder"}
ACTION:{"type":"process_inbox_file","task":"kort resumé","save_to":"ByAulum"}

ACTION:{"type":"create_event","title":"Title","date":"2026-03-09","time":"14:00","duration":60}
ACTION:{"type":"create_multiple_events","events":[{"title":"Title","date":"2026-03-09","time":"18:00","duration":60}]}

ACTION:{"type":"create_event","title":"Reminder","date":"2026-03-28","time":"12:00","reminder":true}
ACTION:{"type":"delete_event","event_id":"EXACT_ID"}
ACTION:{"type":"update_event","event_id":"EXACT_ID","new_time":"15:00","new_date":"2026-03-09","new_title":"New title","new_duration":90}
ACTION:{"type":"create_event_and_invite","title":"Møde","date":"2026-03-09","time":"10:00","duration":60,"invite_to":"Navn"}
ACTION:{"type":"find_contact","query":"Mie","subject":"Subject","body":"Email body"}
ACTION:{"type":"find_contacts","to":"Henrik","cc":["Martin","Søren"],"subject":"Subject","body":"Body"}

Rules:

- For send_email: ONLY use when address confirmed. Otherwise use find_contact.

- Never read full documents or long lists aloud.${confirmedEmailContext}`;

  const messages = activeProject
    ? (conversationHistory.length > 0 ? conversationHistory.slice(-8) : [{ role:'user', content:text }])
    : (homeHistory.length > 0 ? homeHistory.slice(-12) : [{ role:'user', content:text }]);

  try {
    const res = await fetch('/api/claude', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1500, system, messages })
    });
    const data = await res.json();
    if (!data.content?.[0]?.text) {
      isThinking = false;
      const errType = data?.error?.type || '';
      if (errType === 'rate_limit_error') speak('Out of capacity. Please wait 60 seconds and try again.');
      else speak('Something went wrong. Please try again.');
      return;
    }

    let reply = data.content[0].text;
    const actionMatch = reply.match(/ACTION:(\{[^\n]+\})/);
    let parsedAction = null;
    if (actionMatch) {
      reply = reply.replace(/\nACTION:\{[^\n]+\}/, '').trim();
      try { parsedAction = JSON.parse(actionMatch[1]); } catch(e) { console.log('Action parse error:', e); }
    }

    if (activeProject) {
      addBubble('assistant', reply);
      await sb.from('messages').insert({ project_id: activeProject.id, role:'assistant', content:reply });
      conversationHistory.push({ role:'assistant', content:reply });
      if (conversationHistory.length % 8 === 0) saveProjectMemory(activeProject.id, conversationHistory);
    } else {
      addBubble('assistant', reply);
      homeHistory.push({ role:'assistant', content:reply });
      if (homeHistory.length > 12) homeHistory = homeHistory.slice(-12);
    }
    isThinking = false;

    speak(reply, async () => {
      setMicState('idle'); setMicHint('Tryk for at tale'); isThinking = false;
      if (parsedAction) await executeAction(parsedAction);
    });
  } catch(e) {
    console.log('Claude error:', e);
    isThinking = false; setMicState('idle'); setMicHint('Tryk for at tale');
    speak('Something went wrong. Please try again.');
  }
}

async function showAttachmentPicker() {
  try {
    const res = await fetch('/api/drive', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'list_inbox' }) });
    const data = await res.json();
    const files = data.files || [];
    window._inboxFilesForAttach = files;
    const card = document.getElementById('confirmCardBody');
    const existing = document.getElementById('attachmentPicker');
    if (existing) existing.remove();
    if (files.length === 0) { speak('No files found.'); return; }
    const picker = document.createElement('div');
    picker.id = 'attachmentPicker';
    picker.style.cssText = 'margin-bottom:10px;';
    picker.innerHTML = `<div class="email-preview-field-label" style="margin-bottom:6px;">Vælg fil</div>` +

    const sendBtn = card.querySelector('.email-preview-send');
    if (sendBtn) card.insertBefore(picker, sendBtn); else card.appendChild(picker);
  } catch { speak('Could not load files.'); }

function selectAttachment(idx) {
  const file = window._inboxFilesForAttach?.[idx];
  if (!file) return;
  window._emailPreviewAttachment = { driveFileId: file.id, filename: file.name, mimeType: file.mimeType };
  const picker = document.getElementById('attachmentPicker');
  if (picker) picker.remove();
  showEmailPreview(window._emailPreviewTo, window._emailPreviewSubject, document.getElementById('emailPreviewBody')?.value || '', window._emailPreviewOnSend, window._emailPreviewOnCancel, window._emailPreviewCc, false, window._emailPreviewAttachment);
}

function removeAttachment() {
  window._emailPreviewAttachment = null;

async function previewCCSearch() {
  const input = document.getElementById('previewCCInput');
  const query = input?.value?.trim();
  if (!query) return;
  input.disabled = true;
  try {
    const res = await fetch('/api/gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'find_contact', query }) });
    const data = await res.json();

function emailPreviewSend() {

// ═══════════════════════════════════════════════════════
// EXECUTE ACTION
// ═══════════════════════════════════════════════════════
async function executeAction(action) {
  console.log('[Action]', action);
  if (action.type === 'create_project') {
    const { data, error } = await sb.from('projects').insert({ name: action.name }).select();
    if (!error && data?.length > 0) { await loadProjects(); setTimeout(() => openProject(data[0]), 300); }
  } else if (action.type === 'open_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) setTimeout(() => openProject(p), 300);
  } else if (action.type === 'delete_project') {
    const p = projects.find(p => p.name.toLowerCase().includes(action.name.toLowerCase()));
    if (p) { await sb.from('messages').delete().eq('project_id', p.id); await sb.from('projects').delete().eq('id', p.id); if (activeProject?.id === p.id) goHome(); await loadProjects(); }
  } else if (action.type === 'delete_multiple_events') {
    let deleted = 0;
    for (const id of (action.event_ids || [])) {
      try { const res = await fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'delete', event:{ event_id: id } }) }); const d = await res.json(); if (!d.error) deleted++; } catch {}
    }
    speak(`Deleted ${deleted} event${deleted !== 1 ? 's' : ''}.`);
  } else if (action.type === 'delete_event') {
    if (action.event_id) await deleteCalendarEvent(action.event_id);
    else speak("I could not identify that event.");
  } else if (action.type === 'update_event') {
    if (action.event_id) await updateCalendarEvent(action.event_id, action.new_title, action.new_date, action.new_time, action.new_duration, action.description);
    else speak("I could not identify that event.");
  } else if (action.type === 'create_event_and_invite') {
    await createCalendarEvent(action.title, action.date, action.time, action.duration, false, false);
    if (action.invite_to) await findContact(action.invite_to, `Mødeindkaldelse: ${action.title}`, buildInviteBody(action.title, action.date, action.time, action.duration || 60));
  } else if (action.type === 'create_multiple_events') {
    let created = 0;
    for (const e of (action.events || [])) { try { await createCalendarEvent(e.title, e.date, e.time, e.duration||60, e.allday, e.reminder||false, e.description||'', true); created++; } catch {} }
    speak(`Done. Added ${created} event${created !== 1 ? 's' : ''} to your calendar.`);
  } else if (action.type === 'create_event') {
    await createCalendarEvent(action.title, action.date, action.time, action.duration, action.allday, action.reminder, action.description || '');
  } else if (action.type === 'find_contact') {
    await findContact(action.query, action.subject, action.body);
  } else if (action.type === 'find_contacts') {
    const ccArr = Array.isArray(action.cc) ? action.cc : (action.cc ? [action.cc] : []);
    await findContactsWithCC(action.to, ccArr, action.subject, action.body);
  } else if (action.type === 'send_confirmed_email') {
    if (window._confirmedEmail) {
      const to = window._confirmedEmail; window._confirmedEmail = null;
      showEmailPreview(to, action.subject, action.body, (t,s,b,c,a) => sendEmail(t,s,b,c,a), null, action.cc||'', false, null);
    }
  } else if (action.type === 'spell_email') {
    if (window._pendingEmail) {
      window._foundContacts = [{ name: action.email, emails: [action.email] }];
      speak(`Got it. I'll send to ${speakableEmail(action.email)}. Shall I send?`);
    }
  } else if (action.type === 'confirm_email') {
    if (window._foundContacts) {
      const contact = window._foundContacts[(action.index||1)-1];
      if (contact) {
        const draft = window._pendingEmailDraft || {};
        if (draft.subject && draft.body) {
          const emailTo = contact.emails[0];
          window._pendingEmail = window._pendingEmailDraft = window._foundContacts = null;
          hideConfirmCard();
          setTimeout(() => showEmailPreview(emailTo, draft.subject, draft.body, (t,s,b) => sendEmail(t,s,b), null), 300);
        } else {
          window._confirmedEmail = contact.emails[0]; window._foundContacts = null;
          hideConfirmCard(); speak('Got it. What should the email say?');
        }
      }
    }
  } else if (action.type === 'send_email') {
    const looksReal = action.to?.includes('@') && !action.to.includes('example.com') && action.to.split('@')[1]?.includes('.');
    if (!looksReal || !window._confirmedEmail) {
      const query = action.to?.includes('@') ? action.to.split('@')[0].replace(/[._]/g,' ') : (action.to || '');
      await findContact(query, action.subject, action.body);
    } else {
      const to = window._confirmedEmail || action.to; window._confirmedEmail = null;
      showEmailPreview(to, action.subject, action.body, (t,s,b,c) => sendEmail(t,s,b,c), null, action.cc||'');
    }
  } else if (action.type === 'read_inbox') {
    setTimeout(() => { if (!isSpeaking) readInbox(); else setTimeout(readInbox, 500); }, 500);
  } else if (action.type === 'read_email') {
    setTimeout(() => readEmail(action.message_id), 500);
  } else if (action.type === 'open_drive_folder') {
    if (activeProject) {
      await fetchDriveContext(activeProject.name);
      speak(driveFiles.length > 0 ? `Found ${driveFiles.length} file${driveFiles.length>1?'s':''}: ${driveFiles.map(f=>f.name).join(', ')}.` : `The ${activeProject.name} folder is empty.`);
    }
  } else if (action.type === 'list_inbox') {
    await listInbox();
  } else if (action.type === 'process_inbox_file') {
    await processInboxFile(action.task, action.save_to, action.file_name, action.send_email);
  } else if (action.type === 'go_home') {
    goHome();
  }
}

// CALENDAR
// ═══════════════════════════════════════════════════════
let lastFoundEvents = [];

async function createCalendarEvent(title, date, time, duration, allday, reminder, description, silent = false) {
  try {
    const res = await fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'create', event:{ title, date, time, duration, allday, reminder, description } }) });
    const data = await res.json();
    if (!silent) speak(data.id ? `Done. ${title} added to your calendar.` : 'Could not create the event.');
    return data;
  } catch(e) { if (!silent) speak('Could not create calendar event.'); throw e; }
}

async function deleteCalendarEvent(eventId) {
  try {
    const id = eventId || lastFoundEvents[0]?.id;
    if (!id) { speak('I do not know which event to delete.'); return; }
    const eventName = lastFoundEvents[0]?.summary || 'the event';
    const res = await fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'delete', event:{ id } }) });
    const data = await res.json();
    if (data.success) { lastFoundEvents = []; speak(`Done. ${eventName} deleted.`); }
    else speak('Could not delete the event.');
  } catch { speak('Could not delete the event.'); }
}

async function updateCalendarEvent(eventId, newTitle, newDate, newTime, newDuration, description) {
  try {
    const updates = {};
    if (newTitle) updates.summary = newTitle;
    if (description) updates.description = description;
    if (newDate || newTime) {
      const getRes = await fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'get', event:{ id: eventId } }) });
      const original = await getRes.json();
      const origStart = original.start?.dateTime || original.start?.date || '';
      const startDate = newDate || origStart.split('T')[0];
      const startTime = newTime || (origStart.includes('T') ? origStart.split('T')[1].substring(0,5) : '09:00');
      const start = new Date(`${startDate}T${startTime}:00`);
      const end = new Date(start.getTime() + (newDuration||60) * 60000);
      updates.start = { dateTime: start.toISOString(), timeZone: 'Europe/Copenhagen' };
      updates.end = { dateTime: end.toISOString(), timeZone: 'Europe/Copenhagen' };
    }
    const res = await fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'update', event:{ id: eventId, updates } }) });
    const data = await res.json();
    speak(data.id ? 'Done. Event updated.' : 'Could not update the event.');
  } catch { speak('Could not update the event.'); }
}

function speakableEmail(email) {
  if (!email) return '';
  const [user, domain] = email.split('@');
  if (!domain) return email;
  return `${user.length <= 5 ? user.toUpperCase().split('').join(' ') : user.replace(/[._-]/g,' ')} at ${domain.replace(/\./g,' dot ')}`;
}

function buildInviteBody(title, date, time, duration) {
  const d = new Date(`${date}T${time||'09:00'}:00`);
  const dateStr = d.toLocaleDateString('da-DK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const end = new Date(d.getTime() + duration * 60000);
  return `Hej,\n\nJeg vil gerne invitere dig til:\n\nEmne: ${title}\nDato: ${dateStr}\nTidspunkt: ${time||'09:00'} - ${end.toTimeString().substring(0,5)}\n\nSes vi?\n\nVenlig hilsen\nMartin`;
}

window._pendingEmail = null;
window._foundContacts = null;

async function findContactsWithCC(toQuery, ccQueries, subject, body) {
  const ccList = Array.isArray(ccQueries) ? ccQueries : (ccQueries ? [ccQueries] : []);
  speak(`Looking up ${1 + ccList.length} addresses.`);
  const [toRes, ...ccResArr] = await Promise.all([
    fetch('/api/gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'find_contact', query: toQuery }) }),
    ...ccList.map(q => fetch('/api/gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'find_contact', query: q }) }))
  ]);
  const toData = await toRes.json();
  const ccDataArr = await Promise.all(ccResArr.map(r => r.json()));
  const toEmails = [];
  (toData.contacts||[]).forEach(c => (c.emails||[]).forEach(e => toEmails.push({ name:c.name, email:e })));
  const ccGroups = ccDataArr.map((d, i) => {
    const emails = [];
    (d.contacts||[]).forEach(c => (c.emails||[]).forEach(e => emails.push({ name:c.name, email:e })));
    return { query: ccList[i], emails, chosen: null };
  });
  window._pendingEmailDraft = { subject, body };
  window._multiContactState = { toEmails, ccGroups, chosenTo: null, subject, body };
  showMultiContactCard();
}

function showMultiContactCard() {
  const state = window._multiContactState;
  if (!state) return;
  const card = document.getElementById('confirmCard');
  document.getElementById('confirmLabel').textContent = 'Vælg mailadresser';
  const renderGroup = (label, emails, chosen, pickFn, gi) => {
    if (emails.length === 0) return `<div class="email-preview-field"><div class="email-preview-field-label">${label}</div><div style="font-size:13px;color:var(--label);margin-top:4px;">Ikke fundet</div></div>`;
    const btns = emails.map((c, i) => { const sel = chosen === c.email; return `<button onclick="${pickFn}(${gi!==undefined?gi+',':''}${i})" class="email-choice-btn" style="${sel?'background:var(--text);':''}"><div class="email-choice-name" style="${sel?'color:rgba(255,255,255,.7)':''}">${esc(c.name)}</div><div class="email-choice-addr" style="${sel?'color:#fff':''}">${esc(c.email)}</div></button>`; }).join('');
    return `<div class="email-preview-field"><div class="email-preview-field-label">${label}</div><div class="email-choice-list">${btns}</div></div>`;
  };
  let html = renderGroup('TIL', state.toEmails, state.chosenTo, 'multiPickTo', undefined);
  (state.ccGroups||[]).forEach((g, gi) => { html += renderGroup(`CC — ${esc(g.query)}`, g.emails, g.chosen, 'multiPickCC', gi); });
  if (state.chosenTo) html += `<button class="email-preview-send" style="margin-top:12px" onclick="multiContactProceed()">✓ Fortsæt</button>`;
  html += `<button class="email-preview-cancel" onclick="multiContactCancel()">✕ Annuller</button>`;
  document.getElementById('confirmCardBody').innerHTML = html;
  card.style.display = 'block';
}

function multiPickTo(idx) { if (window._multiContactState) { window._multiContactState.chosenTo = window._multiContactState.toEmails[idx]?.email||null; showMultiContactCard(); } }
function multiPickCC(gi, idx) { if (window._multiContactState) { window._multiContactState.ccGroups[gi].chosen = window._multiContactState.ccGroups[gi].emails[idx]?.email||null; showMultiContactCard(); } }
function multiContactProceed() {
  const state = window._multiContactState;
  if (!state?.chosenTo) return;
  const cc = (state.ccGroups||[]).map(g=>g.chosen).filter(Boolean).join(',');
  window._multiContactState = null; hideConfirmCard();
  showEmailPreview(state.chosenTo, state.subject, state.body, (t,s,b,c) => sendEmail(t,s,b,c), null, cc);
}
function multiContactCancel() { window._multiContactState = null; hideConfirmCard(); speak('Ok, cancelled.'); }

async function findContact(query, subject, body) {
  try {
    const res = await fetch('/api/gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'find_contact', query }) });
    const data = await res.json();
    const contacts = data.contacts || [];
    contacts.forEach(c => { c.name = c.name.replace(/^["\\ ]+|["\\ ]+$/g,'').trim(); if (c.emails?.length) saveContactCache(c.name, c.emails); });
    if (contacts.length === 0) {
      window._pendingEmail = { subject, body }; window._pendingContactQuery = query;
      speakQueued(`I could not find anyone named ${query}. Please say their email address.`); return;
    }
    window._pendingEmail = { subject:'', body:'' };
    window._pendingEmailDraft = { subject, body };
    window._foundContacts = contacts;
    const flat = [];
    contacts.forEach(c => (c.emails||[]).forEach(e => flat.push({ name:c.name||e, email:e })));
    if (flat.length === 1) {
      speakQueued(`I found ${flat[0].name}. Is this the right address?`, () => {
        showConfirmCard(`Send mail til ${flat[0].name}`, flat[0].email,
          () => { window._confirmedEmail = flat[0].email; window._toEmailConfirmed = flat[0].email; window._foundContacts = null; hideConfirmCard(); speak('Got it. What should the email say?'); },
          () => { window._foundContacts = null; hideConfirmCard(); speak('Ok. Please say the correct email address.'); }
        );
      });
    } else {
      const byName = {};
      flat.forEach(c => { const k = c.name.toLowerCase(); if (!byName[k]) byName[k] = { name:c.name, emails:[] }; if (!byName[k].emails.includes(c.email)) byName[k].emails.push(c.email); });
      const allEmails = Object.values(byName).flatMap(g => g.emails);
      window._foundContacts = allEmails.map(e => ({ name: flat.find(f=>f.email===e)?.name||e, emails:[e] }));
      speakQueued(`I found ${allEmails.length} addresses for ${flat[0].name}. Tap the right one.`, () => {
        showEmailChoiceCard(flat[0].name, allEmails,
          (chosen) => { window._foundContacts = null; window._confirmedEmail = chosen; window._toEmailConfirmed = chosen; const draft = window._pendingEmailDraft||{}; if (draft.subject&&draft.body) { window._pendingEmailDraft=null; showEmailPreview(chosen, draft.subject, draft.body, (t,s,b,c)=>sendEmail(t,s,b,c), null,'',true); } else speak('Got it. What should the email say?'); },
          () => { window._foundContacts = null; speak('Ok, cancelled.'); }
        );
      });
    }
  } catch { speak('Could not search contacts.'); }
}

async function sendEmail(to, subject, body, cc, attachment) {
  window._toEmailConfirmed = null;
  try {
    const payload = { action:'send', to, subject, body, cc:cc||'' };
    if (attachment?.driveFileId) payload.driveFileId = attachment.driveFileId;
    const res = await fetch('/api/gmail', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    speak(data.id ? 'Email sent.' : 'Could not send the email. ' + (data.error||'Please try again.'));
  } catch { speak('Could not send the email.'); }
}

// VOICE COMMAND HANDLER
// ═══════════════════════════════════════════════════════
function handleCommand(text) {
  setTranscript(text);
  if (text.toLowerCase().includes('morgenoverblik') || text.toLowerCase().includes('godmorgen')) { playMorningBrief(); return; }
  if ((text.toLowerCase().includes('gå hjem') || text.toLowerCase().includes('hjem')) && activeProject) { goHome(); speak('Going home.'); return; }
  if (activeProject) { sendToClaude(text); return; }
  const TASK_WORDS = ['resumé','resume','opsummer','analyser','skriv','send','mail','inbox','fil','hent','lav','opret','slet','find','vis','læs'];
  const hasTask = TASK_WORDS.some(w => text.toLowerCase().includes(w));
  if (!hasTask) {
    for (const p of projects) {
      if (text.toLowerCase().includes(p.name.toLowerCase())) { openProject(p); speak(`Opening ${p.name}.`); return; }
    }
  }
  if (text.toLowerCase().includes('reconnect') || text.toLowerCase().includes('forbind igen')) { window.location.href = '/api/google-auth?force=true'; return; }
  sendToClaude(text);
}

// ═══════════════════════════════════════════════════════
// INBOX FILE PROCESSING
// ═══════════════════════════════════════════════════════
async function listInbox(autoTask, autoSaveTo) {
  try {
    const res = await fetch('/api/drive', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'list_inbox' }) });
    const data = await res.json();
    const files = data.files || [];
    if (files.length === 0) { speak('Your Vox inbox is empty.'); return; }
    window._inboxFiles = files;
    if (files.length === 1 && autoTask) { await processInboxFile(autoTask, autoSaveTo, files[0].name, false); return; }
    speak(`You have ${files.length} file${files.length>1?'s':''} in your inbox: ${files.map(f=>f.name).join(', ')}.`);
  } catch { speak('Could not read your inbox.'); }
}

async function processInboxFile(task, saveTo, fileName, sendEmailAfter) {
  setMicState('thinking'); setMicHint('Læser fil...');
  speak('Reading your file.');
  try {
    const readRes = await fetch('/api/drive', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'read_inbox_file', fileName: fileName||null }) });
    const fileData = await readRes.json();
    if (fileData.error) { speak('Could not read the file. ' + fileData.error); return; }
    const { fileName: name, mimeType, content: fileContent } = fileData;
    setMicHint(`Behandler "${name}"...`);
    speak(`Got it. Processing "${name}" now.`);
    let userContent;
    if (fileContent.type === 'text') {
      userContent = `Here is the document "${name}":\n\n${fileContent.content}\n\nTask: ${task}`;
    } else if (fileContent.type === 'base64') {
      userContent = [{ type: mimeType==='application/pdf'?'document':'image', source:{ type:'base64', media_type:mimeType, data:fileContent.content } }, { type:'text', text:`Task: ${task}. Be thorough. Write in the same language as the document.` }];
    }
    const claudeRes = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, system:'You are processing a document for Martin Høgsgaard. Complete the task thoroughly. Write in the same language as the document unless instructed otherwise.', messages:[{ role:'user', content:userContent }] }) });
    const claudeData = await claudeRes.json();
    const result = claudeData.content?.[0]?.text || '';
    if (!result) { speak('Could not process the file.'); return; }
    const projectFolder = saveTo || (activeProject ? activeProject.name : 'Nye idéer');
    const docName = `${task} — ${name} — ${new Date().toLocaleDateString('da-DK')}`;
    saveToHistory('assistant', result);
    window._lastInboxFile = { driveFileId: fileData.fileId, filename: fileData.fileName, mimeType: fileData.mimeType };
    const saveRes = await fetch('/api/drive', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'save_to_project', projectName:projectFolder, content:result, docName }) });
    const saveData = await saveRes.json();
    speak(saveData.success ? `Done. Saved to your ${projectFolder} folder in Drive.` : `Done. Could not save to Drive.`);
  } catch(e) {
    console.error('processInboxFile error:', e);
    setMicState('idle'); setMicHint('Tryk for at tale');
    speak('Something went wrong processing the file.');
  }
}

function setMicState(state) {
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  btn.className = 'mic-outer';
  if (state === 'listening') { btn.classList.add('listening'); status.textContent = 'Lytter'; }
  else if (state === 'thinking') { btn.classList.add('thinking'); status.textContent = 'Tænker'; }
  else if (state === 'speaking') { btn.classList.add('speaking'); status.textContent = 'Svarer'; }
  else { btn.classList.add('idle'); status.textContent = 'Lytter'; }
}
function setTranscript(t) { document.getElementById('transcriptBox').textContent = t; }
function setMicHint(t) { document.getElementById('micHint').textContent = t; }

// iOS AUDIO UNLOCK + APP START
// ═══════════════════════════════════════════════════════
function startApp() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    setTimeout(() => ctx.close(), 200);
  } catch {}
  try { const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u); } catch {}
  loadVoices();
  [300, 800, 1500, 3000].forEach(t => setTimeout(loadVoices, t));
  document.getElementById('splashScreen').style.display = 'none';
  init();
}
